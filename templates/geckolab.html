<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Geckolab">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="/static/geckolab/manifest.json">
    <title>Geckolab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-sidebar: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            --text-primary: #fff;
            --text-secondary: #b0b0b0;
            --accent: #667eea;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
        }
        body.light-mode {
            --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            --bg-sidebar: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --accent: #4a5fd6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
        }
        .hamburger:hover { background: var(--card-border); }
        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--text-primary);
            margin: 5px 0;
            border-radius: 2px;
        }
        .profile-back-btn {
            position: fixed;
            top: 85px;
            left: 20px;
            z-index: 998;
            cursor: pointer;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.2rem;
        }
        .profile-back-btn:hover { background: var(--card-border); }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--bg-sidebar);
            padding-top: 80px;
            padding-left: 30px;
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--card-border);
        }
        .sidebar a:hover { color: var(--accent); }
        .sidebar a span { margin-right: 10px; }
        .sidebar-header { padding: 12px 0 12px; font-size: 1.1rem; font-weight: bold; color: var(--text-primary, #fff); border-bottom: 2px solid var(--card-border); margin-bottom: 10px; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        body.light-mode .hamburger {
            background: #fff !important;
            border: 1px solid #ddd !important;
        }
        body.light-mode .hamburger-icon {
            background: #1a1a2e !important;
        }
        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: all 0.3s;
            z-index: 1001;
        }
        .theme-switch:hover { background: var(--accent); color: #fff; }
        .gecko-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--gecko-color, #FF6B6B);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .gecko-avatar-lg {
            width: 150px;
            height: 150px;
            border-width: 6px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        body.modal-open { overflow: hidden; }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            width: 95%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.85; transform: scale(0.98); }
        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }
        .btn-secondary:hover { opacity: 0.85; transform: scale(0.98); }
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        .btn-danger:hover { opacity: 0.85; transform: scale(0.98); }
        input[type="text"], input[type="password"], input[type="date"], input[type="number"], input[type="url"], textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        input:focus, textarea:focus {
            outline: 2px solid var(--accent);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: auto; min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
        }
        .calendar-day:hover { background: var(--accent); }
        .calendar-day.other-month { opacity: 0.4; }
        .calendar-day.today { border: 2px solid var(--accent); }
        .log-emoji { font-size: 0.75rem; line-height: 1; max-width: 100%; overflow: hidden; display: inline-block; }
        .calendar-day { min-width: 0; overflow: hidden; }
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { background: #22c55e; color: white; }
        .toast-error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <!-- Hamburger -->
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>
    <!-- Profile Back Button (shown only in profile view) -->
    <button class="profile-back-btn hidden" id="profile-back-btn" onclick="showMainView()">←</button>

    <!-- Sidebar -->
                        <nav class="sidebar" id="sidebar">
        <div class="theme-switch" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Dark Mode</span>
        </div>
        <div class="sidebar-header">App Menu</div>
        <a href="/geckolab"><span>🦎</span> Geckolab</a>
        <a href="/cangjie"><span>🔣</span> 倉頡學堂</a>
        <a href="/news-clipper"><span>📰</span> News Clipper</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
        <a href="https://gemini.google.com/share/b200771ce08e" target="_blank"><span>🧩</span> 中文詞彙測試 (Gemini)</a>
        <a href="https://gemini.google.com/share/97151a39e237" target="_blank"><span>🎭</span> Slide Translator (Gemini)</a>
        <a href="/"><span>👨‍💻</span> About</a>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Main Container -->
    <div class="container mx-auto px-4 pt-12 pb-8 max-w-4xl">
        <!-- Login View -->
        <div id="login-view" class="text-center">
            <h1 class="text-3xl font-bold mb-6">🦎 Geckolab</h1>
            
            <div id="gecko-list-login" class="flex flex-wrap justify-center gap-6 mb-8">
                <!-- Geckos shown for login -->
            </div>
            <button onclick="showLoginModal()" class="btn btn-primary px-8 py-3 text-lg">登入</button>
        </div>

        <!-- Main View (logged in) -->
        <div id="main-view" class="hidden">
            <div class="text-center mb-4">
                <h1 class="text-2xl font-bold">🦎 Geckolab</h1>
                <div class="flex flex-wrap gap-2 justify-center mt-2">
                    <button onclick="showAddGeckoModal()" class="btn btn-secondary">➕ 新增守宮</button>
                    <button onclick="showFeedingReminderModal()" class="btn btn-secondary">🔔 餵食提醒</button>
                    <button onclick="showSettingsModal()" class="btn btn-secondary">⚙️ 設定</button>
                </div>
            </div>
            <div id="gecko-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Geckos will be loaded here -->
            </div>
            
            <!-- Calendar Section -->
            <div class="mt-8">
                <h2 class="text-xl font-bold mb-4">📅 日曆</h2>
                <div id="feeding-reminder-banner" class="mb-4 p-3 rounded-lg bg-yellow-800 text-sm text-white relative"><button onclick="document.getElementById('feeding-reminder-banner').classList.add('hidden')" class="absolute top-1 right-2 opacity-70 hover:opacity-100">✕</button><span id="feeding-reminder-text"></span></div>
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="btn btn-secondary">◀</button>
                    <span id="calendar-title" class="text-lg font-semibold"></span>
                    <button onclick="changeMonth(1)" class="btn btn-secondary">▶</button>
                </div>
                <div id="calendar-wrapper" style="overflow: hidden; position: relative;">
                    <div id="calendar-content" class="calendar-grid mb-2">
                        <div class="text-center font-bold text-red-500">日</div>
                        <div class="text-center font-bold">一</div>
                        <div class="text-center font-bold">二</div>
                        <div class="text-center font-bold">三</div>
                        <div class="text-center font-bold">四</div>
                        <div class="text-center font-bold">五</div>
                        <div class="text-center font-bold text-red-500">六</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Calendar days will be loaded here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Gecko Profile View -->
        <div id="profile-view" class="hidden mt-4">
            <div class="text-center">
                <img id="profile-avatar" src="" class="gecko-avatar gecko-avatar-lg mb-4 mx-auto cursor-pointer" onclick="openAlbumUrl()">
                <h2 id="profile-name" class="text-2xl font-bold mb-2"></h2>
                <p id="profile-species" class="opacity-70 mb-1"></p>
                <p id="profile-personality" class="opacity-70 mb-2"></p>
                <p id="profile-age" class="text-sm opacity-60 mb-4"></p>
                <p id="profile-weight" class="text-lg mb-4"></p>
                <div class="flex justify-center gap-2 flex-wrap">
                    <button onclick="showEditGeckoModal()" class="btn btn-secondary">編輯資料</button>
                    <button onclick="showWeightModal()" class="btn btn-secondary">⚖️ 體重管理</button>
                    <button onclick="showAddLogModal()" class="btn btn-secondary">➕ 新增紀錄</button>
                    <button onclick="confirmRemoveGecko()" class="btn btn-danger">🗑️ 移除守宮</button>
                </div>
            </div>
            
            <!-- Gecko Logs -->
            <div class="mt-6">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-lg font-bold">📋 近期紀錄</h3>
                    <select id="log-period-filter" onchange="loadGeckoLogs(currentGeckoId)" class="text-sm p-1 rounded bg-gray-700 text-white">
                        <option value="7">過去7天</option>
                        <option value="30">過去30天</option>
                    </select>
                </div>
                <div id="profile-logs" class="space-y-2">
                    <!-- Logs will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold">🔐 登入</h2>
                <button class="modal-close" onclick="hideLoginModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="password" id="login-password" placeholder="請輸入密碼" class="w-full">
                <button onclick="login()" class="btn btn-primary w-full mt-2">確認</button>
                <p id="login-error" class="text-red-500 mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Gecko Modal -->
    <div id="gecko-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="gecko-modal-title" class="text-xl font-bold">新增守宮</h2>
                <button class="modal-close" onclick="hideGeckoModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="gecko-id">
                <div class="text-center mb-4">
                    <label class="block mb-2">頭像</label>
                    <img id="gecko-avatar-preview" src="/static/geckolab/default_gecko.png" class="w-24 h-24 rounded-full object-cover mx-auto border-4" style="border-color: var(--gecko-color, #FF6B6B)">
                    <input type="file" id="gecko-avatar-input" accept="image/*" class="mt-2 text-sm">
                </div>
                <input type="text" id="gecko-name" placeholder="名稱 *">
                <input type="text" id="gecko-species" placeholder="品種">
                <input type="text" id="gecko-personality" placeholder="性格">
                <label class="block text-sm mb-1">出生日期</label>
                <input type="date" id="gecko-dob">
                <label class="block text-sm mb-1">領養日期</label>
                <input type="date" id="gecko-adopted">
                <label class="block text-sm mb-1">相簿連結</label>
                <input type="url" id="gecko-album-url" placeholder="https://...">
                <label class="block text-sm mb-1">顏色</label>
                <input type="color" id="gecko-color" value="#FF6B6B" class="w-full h-10 rounded cursor-pointer">
                <button onclick="saveGecko()" class="btn btn-primary w-full mt-4">儲存</button>
            </div>
        </div>
    </div>

    <!-- Feeding Reminder Modal -->
    <div id="feeding-reminder-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold">🔔 餵食提醒設定</h2>
                <button class="modal-close" onclick="hideFeedingReminderModal()">✕</button>
            </div>
            <div class="modal-body">
                <p class="text-sm mb-4 opacity-70">選擇守宮並設定餵食間隔</p>
                <div id="feeding-reminder-list" class="space-y-3 mb-4"></div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold">⚙️ 設定</h2>
                <button class="modal-close" onclick="hideSettingsModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="mb-4">
                    <label class="block text-sm mb-2">更改密碼</label>
                    <input type="password" id="old-password" placeholder="舊密碼" class="w-full mb-2">
                    <input type="password" id="new-password" placeholder="新密碼" class="w-full mb-2">
                    <input type="password" id="confirm-password" placeholder="確認新密碼" class="w-full mb-2">
                    <p id="password-error" class="text-red-500 text-sm hidden mb-2"></p>
                    <button onclick="changePassword()" class="btn btn-primary w-full">更改密碼</button>
                </div>
                <hr class="my-4 opacity-30">
                <div class="mb-4">
                    <label class="block text-sm mb-2">📤 匯出資料</label>
                    <button onclick="exportData()" class="btn btn-primary w-full">下載 CSV 備份</button>
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-2">📥 匯入資料</label>
                    <input type="file" id="import-file" accept=".csv" class="w-full mb-2">
                    <button onclick="importData()" class="btn btn-secondary w-full">上傳 CSV 還原</button>
                </div>
                <hr class="my-4 opacity-30">
                <button onclick="confirmResetData()" class="btn btn-danger w-full">🔄 重置所有資料</button>
                <p class="text-xs opacity-50 mt-2">⚠️ 刪除所有守宮及記錄，無法恢復</p>
                <hr class="my-4 opacity-30">
                <button onclick="logout()" class="btn btn-danger w-full">登出</button>
            </div>
        </div>
    </div>

    <!-- Weight Modal -->
    <div id="weight-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold">⚖️ 體重管理</h2>
                <button class="modal-close" onclick="hideWeightModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="mb-4">
                    <label class="block text-sm mb-1">新增體重紀錄</label>
                    <div class="flex gap-2">
                        <input type="number" id="weight-input" step="0.1" placeholder="體重 (g)" class="flex-1">
                        <input type="date" id="weight-date" class="flex-1">
                        <button onclick="addWeight()" class="btn btn-primary">新增</button>
                    </div>
                </div>
                <div id="weight-chart-container" class="mb-4">
                    <canvas id="weight-chart"></canvas>
                </div>
                <div id="weight-history" class="max-h-60 overflow-y-auto">
                    <!-- Weight history will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold">📝 新增紀錄</h2>
                <button class="modal-close" onclick="hideLogModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="log-gecko-id">
                <label class="block text-sm mb-1">日期</label>
                <input type="date" id="log-date">
                <div class="flex gap-4 mt-2">
                    <label class="flex items-center gap-1">
                        <input type="radio" name="log-period" value="上午" class="accent-blue-500">
                        <span>上午</span>
                    </label>
                    <label class="flex items-center gap-1">
                        <input type="radio" name="log-period" value="下午" class="accent-blue-500">
                        <span>下午</span>
                    </label>
                </div>
                <label class="block text-sm mb-2 mt-2">類型</label>
                <div class="flex gap-2 flex-wrap mb-2">
                    <button type="button" onclick="selectLogType('feeding')" class="btn btn-secondary" data-log-type="feeding">🦗 餵食</button>
                    <button type="button" onclick="selectLogType('peeling')" class="btn btn-secondary" data-log-type="peeling">🦎 脫皮</button>
                    <button type="button" onclick="selectLogType('poo')" class="btn btn-secondary" data-log-type="poo">💩 大便</button>
                    <button type="button" onclick="selectLogType('pee')" class="btn btn-secondary" data-log-type="pee">💧 小便</button>
                </div>
                <input type="hidden" id="log-type">
                <div id="feeding-quantity-section" class="hidden mb-2">
                    <label class="block text-sm mb-1">蟋蟀 (隻)</label>
                    <input type="number" id="log-crickets" min="0" placeholder="0" class="w-full mb-2">
                    <label class="block text-sm mb-1">蟲泥 (克)</label>
                    <input type="number" id="log-worms" min="0" placeholder="0" class="w-full">
                </div>
                <input type="text" id="log-quantity" placeholder="其他數量" class="mt-2">
                <textarea id="log-notes" rows="2" placeholder="備註" class="mt-2"></textarea>
                <button onclick="addLog()" class="btn btn-primary w-full mt-2">儲存</button>
            </div>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div id="day-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="text-xl font-bold" id="day-modal-title">日誌</h2>
                <button class="modal-close" onclick="hideDayModal()">✕</button>
            </div>
            <div class="modal-body" id="day-modal-body">
                <!-- Day logs will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/geckolab/api';
        let isLoggedIn = false;
        let geckos = [];
        let currentGeckoId = null;
        let currentMonth = new Date();
        let selectedLogType = null;

        // Theme
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-icon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('theme-text').textContent = isLight ? 'Light Mode' : 'Dark Mode';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-icon').textContent = '☀️';
                document.getElementById('theme-text').textContent = 'Light Mode';
            }
        }

        // Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Modal helpers
        function closeModal(e) {
            if (e.target.classList.contains('modal')) {
                document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
            }
        }
        function hideLoginModal() { document.getElementById('login-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        function hideGeckoModal() { document.getElementById('gecko-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        function hideWeightModal() { document.getElementById('weight-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        function showFeedingReminderModal() {
            loadFeedingReminders();
            document.getElementById('feeding-reminder-modal').classList.add('show');
            document.body.classList.add('modal-open');
        }
        function hideFeedingReminderModal() { document.getElementById('feeding-reminder-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        
        async function loadFeedingReminders() {
            const res = await fetch(`${API_BASE}/feeding-reminders`);
            const data = await res.json();
            const list = document.getElementById('feeding-reminder-list');
            if (!data.success || geckos.length === 0) {
                list.innerHTML = '<p class="text-sm opacity-50">尚未有任何守宮</p>';
                return;
            }
            list.innerHTML = geckos.map(g => {
                const reminder = data.reminders.find(r => r.gecko_id === g.id);
                const interval = reminder ? reminder.interval_days : 3;
                return `
                <div class="flex items-center justify-between bg-blue-50 dark:bg-blue-900 p-2 rounded">
                    <div class="flex items-center gap-2">
                        <span style="color:${g.color}">${g.name}</span>
                        <select id="interval-${g.id}" class="text-sm p-1 rounded bg-gray-700 text-white">
                            <option value="1" ${interval == 1 ? 'selected' : ''}>每1天</option>
                            <option value="2" ${interval == 2 ? 'selected' : ''}>每2天</option>
                            <option value="3" ${interval == 3 ? 'selected' : ''}>每3天</option>
                            <option value="4" ${interval == 4 ? 'selected' : ''}>每4天</option>
                            <option value="5" ${interval == 5 ? 'selected' : ''}>每5天</option>
                            <option value="7" ${interval == 7 ? 'selected' : ''}>每7天</option>
                        </select>
                        <button type="button" onclick="saveFeedingReminder(${g.id}, document.getElementById('interval-${g.id}').value)" class="btn btn-primary text-sm px-2 py-1">儲存</button>
                    </div>
                    ${reminder ? `<button onclick="deleteFeedingReminder(${g.id})" class="text-red-500">✕</button>` : ''}
                </div>
            `}).join('');
        }
        
        async function saveFeedingReminder(geckoId, interval) {
            await fetch(`${API_BASE}/feeding-reminders/${geckoId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ interval_days: interval })
            });
            loadFeedingReminders();
            loadGeckos();
            updateFeedingReminderBanner();
            showToast('已設定提醒');
        }
        
        async function deleteFeedingReminder(geckoId) {
            if (!confirm('刪除此提醒？')) return;
            await fetch(`${API_BASE}/feeding-reminders/${geckoId}`, { method: 'DELETE' });
            loadFeedingReminders();
            loadGeckos();
            updateFeedingReminderBanner();
            showToast('已刪除提醒');
        }
        
        function updateFeedingReminderBanner() {
            const banner = document.getElementById('feeding-reminder-banner');
            const textSpan = document.getElementById('feeding-reminder-text');
            const geckosWithReminder = geckos.filter(g => g.feeding_interval_days && g.next_feeding_date);
            if (geckosWithReminder.length === 0) {
                banner.classList.add('hidden');
                return;
            }
            // Sort by next feeding date
            geckosWithReminder.sort((a, b) => a.next_feeding_date.localeCompare(b.next_feeding_date));
            // Use local date to avoid timezone issues (toISOString() returns UTC which is 8hrs behind HK)
            const today = new Date().toLocaleDateString('en-CA');
            let html = '<div class="font-semibold mb-2 text-white">🔔 餵食提醒：</div>';
            geckosWithReminder.forEach(g => {
                const isOverdue = g.next_feeding_date < today;
                const color = isOverdue ? 'text-red-400' : 'text-white';
                if (isOverdue) {
                    const overdueDate = new Date(g.next_feeding_date);
                    const todayDate = new Date();
                    // Use local midnight to avoid timezone offset issues
                    todayDate.setHours(0, 0, 0, 0);
                    overdueDate.setHours(0, 0, 0, 0);
                    const daysPassed = Math.floor((todayDate - overdueDate) / (1000 * 60 * 60 * 24));
                    html += `<div class="${color}">• ${g.name} - 已過${daysPassed}天，請盡快餵食！</div>`;
                } else {
                    html += `<div class="${color}">• ${g.name} - 下次 ${g.next_feeding_date} (每${g.feeding_interval_days}天)</div>`;
                }
            });
            textSpan.innerHTML = html;
            banner.classList.remove('hidden');
        }
        
        function showSettingsModal() { document.getElementById('settings-modal').classList.add('show'); document.body.classList.add('modal-open'); }
        function hideSettingsModal() { document.getElementById('settings-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        function hideLogModal() { document.getElementById('log-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }
        function hideDayModal() { document.getElementById('day-modal').classList.remove('show'); document.body.classList.remove('modal-open'); }

        // Login
        function showLoginModal() { document.getElementById('login-modal').classList.add('show'); document.body.classList.add('modal-open'); }
        async function login() {
            const password = document.getElementById('login-password').value;
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `password=${encodeURIComponent(password)}`
            });
            const data = await res.json();
            if (data.success) {
                isLoggedIn = true;
                hideLoginModal();
                showMainView();
                loadGeckos();
            } else {
                document.getElementById('login-error').textContent = data.error || '登入失敗';
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
        function logout() {
            isLoggedIn = false;
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            hideSettingsModal();
            fetch('/geckolab/logout');
        }

        async function changePassword() {
            const oldPwd = document.getElementById('old-password').value;
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const errEl = document.getElementById('password-error');
            errEl.classList.add('hidden');
            if (!oldPwd || !newPwd) { errEl.textContent = '請填寫所有欄位'; errEl.classList.remove('hidden'); return; }
            if (newPwd !== confirmPwd) { errEl.textContent = '新密碼不一致'; errEl.classList.remove('hidden'); return; }
            const res = await fetch(`${API_BASE}/change-password`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `old_password=${encodeURIComponent(oldPwd)}&new_password=${encodeURIComponent(newPwd)}`
            });
            const data = await res.json();
            if (data.success) {
                hideSettingsModal();
                showToast('密碼已更改');
                document.getElementById('old-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            } else { errEl.textContent = data.error || '更改失敗'; errEl.classList.remove('hidden'); }
        }

        function confirmResetData() {
            if (!confirm('確定要刪除所有資料嗎？\n此操作無法恢復！')) return;
            resetAllData();
        }

        async function resetAllData() {
            const res = await fetch(`${API_BASE}/reset-data`, {
                method: 'POST',
                credentials: 'same-origin'
            });
            const data = await res.json();
            if (data.success) {
                hideSettingsModal();
                showToast('所有資料已刪除');
                logout();
            }
        }

        async function exportData() {
            const res = await fetch(`${API_BASE}/export`, { credentials: 'same-origin' });
            const data = await res.json();
            if (data.success) {
                const blob = new Blob([data.csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `geckolab_backup_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('已下載備份');
            }
        }

        function importData() {
            const fileInput = document.getElementById('import-file');
            const file = fileInput.files[0];
            if (!file) { showToast('請選擇檔案', 'error'); return; }
            const reader = new FileReader();
            reader.onload = async function(e) {
                const csv = e.target.result;
                const res = await fetch(`${API_BASE}/import`, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ csv })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('已還原資料');
                    hideSettingsModal();
                    loadGeckos();
                } else {
                    showToast(data.error || '還原失敗', 'error');
                }
            };
            reader.readAsText(file);
        }

        // Views
        function showMainView() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById('profile-back-btn').classList.add('hidden');
            document.getElementById('hamburger').classList.remove('hidden');
            currentGeckoId = null;
        }
        function showProfileView(geckoId) {
            currentGeckoId = geckoId;
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('profile-view').classList.remove('hidden');
            document.getElementById('profile-back-btn').classList.remove('hidden');
            loadGeckoProfile(geckoId);
        }

        // Load geckos
        async function loadGeckos() {
            const res = await fetch(`${API_BASE}/geckos`);
            const data = await res.json();
            geckos = data.geckos || [];
            renderGeckoList();
            if (isLoggedIn) {
                renderGeckoGrid();
                renderCalendar();
                updateFeedingReminderBanner();
            }
        }

        function renderGeckoList() {
            const container = document.getElementById('gecko-list-login');
            container.innerHTML = geckos.map(g => `
                <div class="text-center">
                    <img src="${g.avatar_path || '/static/geckolab/default_gecko.png'}" 
                         class="gecko-avatar" style="--gecko-color: ${g.color}">
                    <p class="mt-2 font-semibold">${g.name}</p>
                </div>
            `).join('');
        }

        function renderGeckoGrid() {
            const container = document.getElementById('gecko-grid');
            container.innerHTML = geckos.map(g => `
                <div class="text-center cursor-pointer" onclick="showProfileView(${g.id})">
                    <img src="${g.avatar_path || '/static/geckolab/default_gecko.png'}" 
                         class="gecko-avatar mx-auto" style="--gecko-color: ${g.color}">
                    <p class="mt-2 font-semibold">${g.name}</p>
                    <p class="text-xs opacity-60">${g.species || ''}</p>
                </div>
            `).join('');
        }

        // Gecko Profile
        async function loadGeckoProfile(geckoId) {
            const res = await fetch(`${API_BASE}/geckos/${geckoId}`);
            const data = await res.json();
            if (!data.success) return;
            const g = data.gecko;
            
            document.getElementById('profile-avatar').src = g.avatar_path || '/static/geckolab/default_gecko.png';
            document.getElementById('profile-avatar').style.setProperty('--gecko-color', g.color);
            document.getElementById('profile-name').textContent = g.name;
            document.getElementById('profile-species').textContent = g.species || '';
            document.getElementById('profile-personality').textContent = g.personality || '';
            let ageText = '';
            if (g.age_years !== undefined) {
                ageText = `${g.age_years}歲 ${g.age_months}個月 ${g.age_days}日`;
            }
            document.getElementById('profile-age').textContent = ageText;
            document.getElementById('profile-weight').textContent = g.latest_weight ? `體重: ${g.latest_weight}g` : '尚未記錄體重';
            
            // Store for editing
            window.currentGecko = g;
            
            // Show album link if album_url exists (avatar click handles this)
            const albumLink = document.getElementById('profile-album-link');
            if (albumLink) {
                albumLink.href = g.album_url || '#';
            }
            
            loadGeckoLogs(geckoId);
        }

        async function loadGeckoLogs(geckoId) {
            const res = await fetch(`${API_BASE}/geckos/${geckoId}/logs`);
            const data = await res.json();
            const logs = data.logs || [];
            
            // Filter by selected period
            const periodDays = parseInt(document.getElementById('log-period-filter').value);
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - periodDays);
            const cutoffStr = cutoffDate.toISOString().split('T')[0];
            
            const container = document.getElementById('profile-logs');
            if (logs.length === 0) {
                container.innerHTML = '<p class="opacity-60">暫時未有紀錄</p>';
            } else {
                // Sort by date descending (new to old)
                const sortedLogs = [...logs]
                    .filter(log => log.log_date >= cutoffStr)
                    .sort((a, b) => {
                        if (a.log_date !== b.log_date) return b.log_date.localeCompare(a.log_date);
                        return b.id - a.id;  // Same date, use id desc
                    });
                container.innerHTML = sortedLogs.length === 0 
                    ? '<p class="opacity-60">期內暫無紀錄</p>'
                    : sortedLogs.map(log => {
                        const emoji = log.log_type === 'feeding' ? '🦗' : log.log_type === 'peeling' ? '🦎' : log.log_type === 'poo' ? '💩' : '💧';
                        const typeName = log.log_type === 'feeding' ? '餵食' : log.log_type === 'peeling' ? '脫皮' : log.log_type === 'poo' ? '大便' : '小便';
                        const d = new Date(log.log_date);
                        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
                        const dayName = dayNames[d.getDay()];
                        const periodDisplay = log.period ? ` ${log.period}` : '';
                        return `<div class="flex justify-between items-center p-2 rounded" style="background: var(--card-bg)">
                            <span>
                                <span style="background:${log.color}44; color:${log.color}; border-radius:4px; padding:0 4px;">${emoji}</span>
                                ${typeName} ${log.log_date}${periodDisplay} (週${dayName}) ${log.quantity || ''}
                            </span>
                            <div class="flex gap-2">
                                <button onclick="editLog(${log.id}, '${log.log_type}', '${log.log_date}', '${log.quantity || ''}', '${log.period || ''}')" class="text-blue-500">✏️</button>
                                <button onclick="deleteLog(${log.id})" class="text-red-500">✕</button>
                            </div>
                        </div>`;
                    }).join('');
            }
        }

        async function deleteLog(logId) {
            if (!confirm('確定刪除？')) return;
            await fetch(`${API_BASE}/logs/${logId}`, { method: 'DELETE' });
            if (currentGeckoId) loadGeckoLogs(currentGeckoId);
        }
        
        function editLog(logId, logType, logDate, quantity, period) {
            showAddLogModal();
            document.getElementById('log-date').value = logDate;
            if (period) document.querySelector('input[name="log-period"][value="' + period + '"]').checked = true;
            // Set log type
            document.querySelectorAll('[data-log-type]').forEach(b => {
                if (b.dataset.logType === logType) {
                    selectLogType(logType);
                }
            });
            if (logType === 'feeding') {
                // Parse quantity like "2隻蟋蟀 + 3g蟲泥"
                const cricketsMatch = quantity.match(/(\d+)隻蟋蟀/);
                const wormsMatch = quantity.match(/(\d+)g蟲泥/);
                if (cricketsMatch) document.getElementById('log-crickets').value = cricketsMatch[1];
                if (wormsMatch) document.getElementById('log-worms').value = wormsMatch[1];
            } else {
                document.getElementById('log-quantity').value = quantity;
            }
            // Store logId for update
            document.getElementById('log-modal').dataset.editLogId = logId;
        }

        // Add/Edit Gecko
        function showAddGeckoModal() {
            document.getElementById('gecko-modal-title').textContent = '新增守宮';
            document.getElementById('gecko-id').value = '';
            document.getElementById('gecko-name').value = '';
            document.getElementById('gecko-species').value = '';
            document.getElementById('gecko-dob').value = '';
            document.getElementById('gecko-adopted').value = '';
            document.getElementById('gecko-album-url').value = '';
            document.getElementById('gecko-color').value = '#FF6B6B';
            document.getElementById('gecko-avatar-preview').src = '/static/geckolab/default_gecko.png';
            document.getElementById('gecko-modal').classList.add('show');
        }

        function openAlbumUrl() {
            const g = window.currentGecko;
            if (g && g.album_url) {
                window.open(g.album_url, '_blank');
            }
        }

        async function confirmRemoveGecko() {
            const g = window.currentGecko;
            if (!confirm(`確定要刪除「${g.name}」嗎？\n所有記錄會被一併刪除，無法恢復！`)) return;
            const res = await fetch(`${API_BASE}/geckos/${g.id}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            const data = await res.json();
            if (data.success) {
                showToast('已刪除');
                showMainView();
                loadGeckos();
            }
        }

        function showEditGeckoModal() {
            const g = window.currentGecko;
            if (!g) return;
            document.getElementById('gecko-modal-title').textContent = '編輯守宮';
            document.getElementById('gecko-id').value = g.id;
            document.getElementById('gecko-name').value = g.name;
            document.getElementById('gecko-species').value = g.species || '';
            document.getElementById('gecko-personality').value = g.personality || '';
            document.getElementById('gecko-dob').value = g.dob || '';
            document.getElementById('gecko-adopted').value = g.adopted_date || '';
            document.getElementById('gecko-album-url').value = g.album_url || '';
            document.getElementById('gecko-color').value = g.color || '#FF6B6B';
            document.getElementById('gecko-avatar-preview').src = g.avatar_path || '/static/geckolab/default_gecko.png';
            document.getElementById('gecko-modal').classList.add('show');
        }

        async function saveGecko() {
            const id = document.getElementById('gecko-id').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('gecko-name').value);
            formData.append('species', document.getElementById('gecko-species').value);
            formData.append('personality', document.getElementById('gecko-personality').value);
            formData.append('dob', document.getElementById('gecko-dob').value);
            formData.append('adopted_date', document.getElementById('gecko-adopted').value);
            formData.append('album_url', document.getElementById('gecko-album-url').value);
            formData.append('color', document.getElementById('gecko-color').value);
            
            const avatarInput = document.getElementById('gecko-avatar-input');
            if (avatarInput.files[0]) {
                formData.append('avatar', avatarInput.files[0]);
            }
            
            const url = id ? `${API_BASE}/geckos/${id}` : `${API_BASE}/geckos`;
            const method = id ? 'PUT' : 'POST';
            
            const res = await fetch(url, { method, body: formData });
            const data = await res.json();
            
            if (data.success) {
                hideGeckoModal();
                showToast(id ? '已更新' : '已新增');
                loadGeckos();
                if (id) showProfileView(parseInt(id));
            }
        }

        // Weight
        function showWeightModal() {
            if (!currentGeckoId) return;
            document.getElementById('weight-modal').classList.add('show');
            document.getElementById('weight-date').value = new Date().toISOString().split('T')[0];
            loadWeightHistory();
        }

        async function loadWeightHistory() {
            const res = await fetch(`${API_BASE}/geckos/${currentGeckoId}/weights`);
            const data = await res.json();
            const weights = data.weights || [];
            
            document.getElementById('weight-history').innerHTML = weights.length === 0 
                ? '<p class="opacity-60 text-center">暫時未有體重紀錄</p>'
                : weights.map(w => `<div class="flex justify-between items-center p-2 border-b" style="border-color: var(--card-border)">
                    <span class="flex-1">${w.record_date}</span>
                    <span class="font-bold mx-2">${w.weight}g</span>
                    <button onclick="editWeight(${w.id}, '${w.record_date}', ${w.weight})" class="text-blue-500 text-sm mr-2">✏️</button>
                    <button onclick="deleteWeight(${w.id})" class="text-red-500 text-sm">✕</button>
                </div>`).join('');
            
            // Draw chart
            drawWeightChart(weights);
        }

        function drawWeightChart(weights) {
            const ctx = document.getElementById('weight-chart');
            if (!ctx) return;
            if (window.weightChartInstance) window.weightChartInstance.destroy();
            const sorted = [...weights].sort((a,b) => a.record_date.localeCompare(b.record_date));
            window.weightChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.map(w => w.record_date),
                    datasets: [{
                        label: '體重 (g)',
                        data: sorted.map(w => w.weight),
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.15)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#00d4ff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { 
                        legend: { display: false },
                        title: { display: false }
                    },
                    scales: { 
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'rgba(255,255,255,0.7)' }
                        },
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'rgba(255,255,255,0.7)' }
                        }
                    }
                }
            });
        }

        function editWeight(weightId, date, weight) {
            const newWeight = prompt('請輸入新體重 (g):', weight);
            if (newWeight === null || newWeight === '') return;
            updateWeight(weightId, newWeight, date);
        }

        async function updateWeight(weightId, weight, date) {
            const formData = new FormData();
            formData.append('weight', weight);
            formData.append('record_date', date);
            await fetch(`${API_BASE}/geckos/${currentGeckoId}/weights/${weightId}`, {
                method: 'PUT',
                body: formData,
                credentials: 'same-origin'
            });
            loadWeightHistory();
            showToast('已更新');
        }

        async function deleteWeight(weightId) {
            if (!confirm('確定要刪除呢個體重記錄？')) return;
            await fetch(`${API_BASE}/geckos/${currentGeckoId}/weights/${weightId}`, { method: 'DELETE', credentials: 'same-origin' });
            loadWeightHistory();
            showToast('已刪除');
        }

        async function addWeight() {
            const weight = document.getElementById('weight-input').value;
            const date = document.getElementById('weight-date').value;
            if (!weight) return;
            
            const formData = new FormData();
            formData.append('weight', weight);
            formData.append('record_date', date);
            
            await fetch(`${API_BASE}/geckos/${currentGeckoId}/weights`, {
                method: 'POST',
                body: formData
            });
            
            document.getElementById('weight-input').value = '';
            loadWeightHistory();
            renderCalendar();
            showToast('已新增體重');
        }

        // Logs
        function showAddLogModal() {
            if (!currentGeckoId) return;
            document.getElementById('log-modal').classList.add('show');
            document.body.classList.add('modal-open');
            document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
            // Auto-detect morning/afternoon based on current hour
            const hour = new Date().getHours();
            const defaultPeriod = hour < 12 ? '上午' : '下午';
            document.querySelector('input[name="log-period"][value="' + defaultPeriod + '"]').checked = true;
            document.getElementById('log-type').value = '';
            document.getElementById('log-quantity').value = '';
            document.getElementById('log-notes').value = '';
            selectedLogType = null;
            document.querySelectorAll('[data-log-type]').forEach(b => b.classList.remove('btn-primary'));
            document.querySelectorAll('[data-log-type]').forEach(b => b.classList.add('btn-secondary'));
        }

        function selectLogType(type) {
            selectedLogType = type;
            document.getElementById('log-type').value = type;
            document.querySelectorAll('[data-log-type]').forEach(b => {
                if (b.dataset.logType === type) {
                    b.classList.remove('btn-secondary');
                    b.classList.add('btn-primary');
                } else {
                    b.classList.remove('btn-primary');
                    b.classList.add('btn-secondary');
                }
            });
            // Show/hide feeding quantity fields
            const feedingSection = document.getElementById('feeding-quantity-section');
            feedingSection.classList.toggle('hidden', type !== 'feeding');
            if (type !== 'feeding') {
                document.getElementById('log-crickets').value = '';
                document.getElementById('log-worms').value = '';
            }
        }

        async function addLog() {
            if (!selectedLogType) {
                showToast('請選擇類型', 'error');
                return;
            }
            
            const logModal = document.getElementById('log-modal');
            const editLogId = logModal.dataset.editLogId;
            
            if (editLogId) {
                // Update existing log
                const crickets = document.getElementById('log-crickets').value;
                const worms = document.getElementById('log-worms').value;
                let qty = [];
                if (crickets) qty.push(`${crickets}隻蟋蟀`);
                if (worms) qty.push(`${worms}g蟲泥`);
                const otherQty = document.getElementById('log-quantity').value;
                if (otherQty) qty.push(otherQty);
                
                await fetch(`${API_BASE}/logs/${editLogId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        log_date: document.getElementById('log-date').value,
                        log_type: selectedLogType,
                        quantity: qty.join(' + ') || '',
                        notes: document.getElementById('log-notes').value,
                        period: document.querySelector('input[name="log-period"]:checked')?.value || ''
                    })
                });
                delete logModal.dataset.editLogId;
                hideLogModal();
                showToast('已更新紀錄');
            } else {
                // Create new log
                const formData = new FormData();
                formData.append('log_type', selectedLogType);
                formData.append('log_date', document.getElementById('log-date').value);
                
                if (selectedLogType === 'feeding') {
                    const crickets = document.getElementById('log-crickets').value;
                    const worms = document.getElementById('log-worms').value;
                    let qty = [];
                    if (crickets) qty.push(`${crickets}隻蟋蟀`);
                    if (worms) qty.push(`${worms}g蟲泥`);
                    const otherQty = document.getElementById('log-quantity').value;
                    if (otherQty) qty.push(otherQty);
                    formData.append('quantity', qty.join(' + '));
                } else {
                    formData.append('quantity', document.getElementById('log-quantity').value);
                }
                formData.append('notes', document.getElementById('log-notes').value);
                formData.append('period', document.querySelector('input[name="log-period"]:checked')?.value || '');
                
                await fetch(`${API_BASE}/geckos/${currentGeckoId}/logs`, {
                    method: 'POST',
                    body: formData
                });
                hideLogModal();
                showToast('已新增紀錄');
            }
            loadGeckoLogs(currentGeckoId);
            loadGeckos();  // Refresh feeding reminder banner
            renderCalendar();
        }

        // Calendar
        let swipeDirection = 0; // -1 = right swipe (past month), +1 = left swipe (next month)
        function changeMonth(delta, fromSwipe = false) {
            const wrapper = document.getElementById('calendar-wrapper');
            const content = document.getElementById('calendar-content');
            const grid = document.getElementById('calendar-grid');
            
            if (fromSwipe && wrapper && content && grid) {
                const dir = delta > 0 ? 1 : -1;
                // Old month slides out in swipe direction
                const slideOut = dir > 0 ? '-100%' : '100%';
                // New month slides in from OPPOSITE direction
                const slideIn = dir > 0 ? '100%' : '-100%';
                
                content.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                content.style.transform = `translateX(${slideOut})`;
                content.style.opacity = '0';
                grid.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                grid.style.transform = `translateX(${slideOut})`;
                grid.style.opacity = '0';
                
                setTimeout(() => {
                    currentMonth.setMonth(currentMonth.getMonth() + delta);
                    renderCalendar();
                    
                    content.style.transition = 'none';
                    content.style.transform = `translateX(${slideIn})`;
                    content.style.opacity = '0';
                    grid.style.transition = 'none';
                    grid.style.transform = `translateX(${slideIn})`;
                    grid.style.opacity = '0';
                    
                    requestAnimationFrame(() => {
                        content.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
                        content.style.transform = 'translateX(0)';
                        content.style.opacity = '1';
                        grid.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
                        grid.style.transform = 'translateX(0)';
                        grid.style.opacity = '1';
                    });
                }, 220);
                return;
            }
            
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderCalendar();
        }

        // Swipe detection for calendar
        let touchStartX = 0;
        let touchEndX = 0;
        const calendarGrid = document.getElementById('calendar-grid');
        if (calendarGrid) {
            calendarGrid.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            calendarGrid.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
        }
        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) { // threshold 50px
                if (diff > 0) {
                    changeMonth(1, true); // swipe left → next month
                } else {
                    changeMonth(-1, true); // swipe right → past month
                }
            }
        }

        // Cache for geckos data (valid for session)
        let geckosCache = null;
        let geckosCacheTime = 0;
        const GECKOS_CACHE_TTL = 60000; // 1 minute cache

        // Cache for monthly logs
        const logsCache = {};
        const LOGS_CACHE_TTL = 30000; // 30 seconds cache

        async function getGeckos() {
            const now = Date.now();
            if (geckosCache && (now - geckosCacheTime) < GECKOS_CACHE_TTL) {
                return geckosCache;
            }
            const res = await fetch(`${API_BASE}/geckos`);
            const data = await res.json();
            geckosCache = data.geckos || [];
            geckosCacheTime = now;
            return geckosCache;
        }

        async function getMonthlyLogs(year, month) {
            const cacheKey = `${year}-${month}`;
            const now = Date.now();
            if (logsCache[cacheKey] && (now - logsCache[cacheKey].time) < LOGS_CACHE_TTL) {
                return logsCache[cacheKey].data;
            }
            const res = await fetch(`${API_BASE}/logs/month?month=${month}&year=${year}`);
            const data = await res.json();
            logsCache[cacheKey] = { data: data.logs || [], time: now };
            return logsCache[cacheKey].data;
        }

        async function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth() + 1;
            document.getElementById('calendar-title').textContent = `${year}年 ${month}月`;
            
            // Get logs for this month (with cache)
            const logs = await getMonthlyLogs(year, month);
            
            // Get adoption anniversaries (use cache)
            const geckos = await getGeckos();
            const anniversaryMap = {};
            geckos.forEach(g => {
                if (g.adopted_date) {
                    const [adoptYear, adoptMonth, adoptDay] = g.adopted_date.split('-').map(Number);
                    for (let y = adoptYear + 1; y <= year; y++) {
                        const annivDate = `${y}-${String(adoptMonth).padStart(2, '0')}-${String(adoptDay).padStart(2, '0')}`;
                        if (!anniversaryMap[annivDate]) anniversaryMap[annivDate] = [];
                        anniversaryMap[annivDate].push({ name: g.name, color: g.color });
                    }
                }
            });
            
            // Build log map
            const logMap = {};
            logs.forEach(log => {
                if (!logMap[log.log_date]) logMap[log.log_date] = [];
                logMap[log.log_date].push(log);
            });
            
            // Calendar calculation
            const firstDay = new Date(year, month - 1, 1);
            const lastDay = new Date(year, month, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month - 1;
            
            let html = '';
            for (let i = 0; i < startDay; i++) {
                html += '<div class="calendar-day other-month"></div>';
            }
            for (let d = 1; d <= totalDays; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = isCurrentMonth && d === today.getDate();
                const dayLogs = logMap[dateStr] || [];
                const dayAnniversaries = anniversaryMap[dateStr] || [];
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''}" onclick="showDayDetail('${dateStr}')">
                    <span>${d}</span>
                    <div class="flex gap-1 flex-wrap justify-center">
                        ${dayLogs.slice(0, 3).map(l => {
                            const emoji = l.log_type === 'feeding' ? '🦗' : l.log_type === 'peeling' ? '🦎' : l.log_type === 'poo' ? '💩' : '💧';
                            return `<span class="log-emoji" style="background:${l.color}44; color:${l.color}; border-radius:4px; padding:0 2px;">${emoji}</span>`;
                        }).join('')}${dayLogs.length > 3 ? '<span class="log-emoji">...</span>' : ''}
                        ${dayAnniversaries.slice(0, 2).map(a => {
                            return `<span class="log-emoji" style="background:${a.color}44; color:${a.color}; border-radius:4px; padding:0 2px;">🎉</span>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            document.getElementById('calendar-grid').innerHTML = html;
        }

        async function showDayDetail(date) {
            const [year, month, day] = date.split('-').map(Number);
            const res = await fetch(`${API_BASE}/logs?date=${date}`);
            const data = await res.json();
            const logs = data.logs || [];
            
            const d = new Date(date);
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            const dayName = dayNames[d.getDay()];
            document.getElementById('day-modal-title').textContent = `${date} (週${dayName})`;
            
            // Get adoption anniversaries for this date (use cache)
            const geckos = await getGeckos();
            const anniversaries = [];
            geckos.forEach(g => {
                if (g.adopted_date) {
                    const [adoptYear, adoptMonth, adoptDay] = g.adopted_date.split('-').map(Number);
                    if (adoptMonth === month && adoptDay === day) {
                        const years = year - adoptYear;
                        if (years > 0) anniversaries.push({ name: g.name, years, color: g.color });
                    }
                }
            });
            
            // Sort by period: 上午 first, 下午 second, empty last
            const periodOrder = { '上午': 0, '下午': 1, '': 2 };
            const sortedLogs = [...logs].sort((a, b) => {
                const pa = periodOrder[a.period] ?? 2;
                const pb = periodOrder[b.period] ?? 2;
                if (pa !== pb) return pa - pb;
                return a.id - b.id;
            });
            
            let html = '';
            if (anniversaries.length > 0) {
                html += anniversaries.map(a => `
                    <div class="flex justify-between items-center p-2 rounded mb-2" style="background: var(--card-bg); border-left: 4px solid ${a.color}">
                        <span>
                            <span style="background:${a.color}44; color:${a.color}; border-radius:4px; padding:0 4px;">🎉</span>
                            ${a.name} 領養週年 ${a.years}週年
                        </span>
                    </div>`).join('');
            }
            if (sortedLogs.length === 0 && anniversaries.length === 0) {
                html = '<p class="text-center opacity-60">暫時未有紀錄</p>';
            } else if (sortedLogs.length > 0) {
                html += sortedLogs.map(l => {
                    const emoji = l.log_type === 'feeding' ? '🦗' : l.log_type === 'peeling' ? '🦎' : l.log_type === 'poo' ? '💩' : '💧';
                    const typeName = l.log_type === 'feeding' ? '餵食' : l.log_type === 'peeling' ? '脫皮' : l.log_type === 'poo' ? '大便' : '小便';
                    const periodDisplay = l.period ? ` ${l.period}` : '';
                    return `<div class="flex justify-between items-center p-2 rounded mb-2" style="background: var(--card-bg); border-left: 4px solid ${l.color}">
                        <span>
                            <span style="background:${l.color}44; color:${l.color}; border-radius:4px; padding:0 4px;">${emoji}</span>
                            ${typeName}${periodDisplay} - ${l.name} ${l.quantity || ''}
                        </span>
                    </div>`;
                }).join('');
            }
            document.getElementById('day-modal-body').innerHTML = html;
            
            document.getElementById('day-modal').classList.add('show');
            document.body.classList.add('modal-open');
        }

        // Avatar preview
        document.getElementById('gecko-avatar-input').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('gecko-avatar-preview').src = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        document.getElementById('gecko-color').addEventListener('input', function(e) {
            document.getElementById('gecko-avatar-preview').style.borderColor = e.target.value;
        });

        // Init
        initTheme();
        
        // Check if user has valid token for auto-login
        async function checkAuthAndLogin() {
            try {
                const res = await fetch(`${API_BASE}/check-auth`);
                const data = await res.json();
                if (data.logged_in) {
                    isLoggedIn = true;
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('main-view').classList.remove('hidden');
                    renderGeckoGrid();
                    renderCalendar();
                    updateFeedingReminderBanner();
                }
            } catch (e) {
                console.log('Auth check failed:', e);
            }
            loadGeckos();
        }
        checkAuthAndLogin();

        // Register Service Worker for PWA

        // Register Service Worker for PWA (disabled - PWA works without it)
    </script>
</body>
