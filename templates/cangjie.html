<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡學堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-sidebar: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            --text-primary: #fff;
            --text-secondary: #b0b0b0;
            --accent: #667eea;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
        }
        body.light-mode {
            --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            --bg-sidebar: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --accent: #4a5fd6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
        }
        .hamburger:hover { background: var(--card-border); }
        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--text-primary);
            margin: 5px 0;
            border-radius: 2px;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--bg-sidebar);
            padding-top: 80px;
            padding-left: 30px;
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            padding: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--card-border);
        }
        .sidebar a:hover { color: var(--accent); }
        .sidebar a span { margin-right: 10px; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        body.light-mode .hamburger {
            background: #fff !important;
            border: 1px solid #ddd !important;
        }
        body.light-mode .hamburger-icon {
            background: #1a1a2e !important;
        }
        .theme-switch {
            cursor: pointer;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-primary);
            z-index: 1001;
        }
        .theme-switch:hover { background: var(--accent); color: #fff; }
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-correct { background: #22c55e; color: white; }
        .toast-wrong { background: #ef4444; color: white; }
        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .star { color: #fbbf24; }
        .star.empty { color: #555; }
        .hint-text { color: var(--accent); font-size: 0.9rem; }
        
        /* Keyboard */
        .keyboard-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 4px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 3px;
        }
        .kb-key {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-width: 0;
            aspect-ratio: 1 / 0.9;
            max-width: 48px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .kb-key:active {
            background: var(--accent);
            transform: scale(0.95);
        }
        .kb-key .letter {
            font-weight: bold;
            font-size: clamp(0.8rem, 3vw, 1.1rem);
        }
        .kb-key .radical {
            font-size: clamp(0.45rem, 1.6vw, 0.65rem);
            opacity: 0.7;
            margin-top: 1px;
        }
        
        /* Answer display - breakdown style */
        .breakdown-display {
            display: flex;
            justify-content: center;
            gap: 6px;
            min-height: 60px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .breakdown-char {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: clamp(36px, 10vw, 56px);
            height: clamp(50px, 14vw, 72px);
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .breakdown-char.highlight {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .breakdown-char .the-char {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: bold;
        }
        .breakdown-char .the-code {
            font-size: clamp(0.5rem, 1.8vw, 0.7rem);
            color: var(--text-secondary);
        }
        .breakdown-char.highlight .the-code {
            color: rgba(255,255,255,0.8);
        }
        .breakdown-char .the-name {
            font-size: clamp(0.35rem, 1.2vw, 0.5rem);
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        /* User input area */
        .input-area {
            display: flex;
            justify-content: center;
            gap: 3px;
            min-height: 48px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .input-char {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(32px, 8vw, 48px);
            height: clamp(40px, 10vw, 56px);
            background: var(--accent);
            color: white;
            border-radius: 6px;
            font-weight: bold;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            animation: popIn 0.2s ease;
        }
        .input-placeholder {
            width: clamp(32px, 8vw, 48px);
            height: clamp(40px, 10vw, 56px);
            border: 2px dashed var(--card-border);
            border-radius: 6px;
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        @media (max-width: 400px) {
            .kb-key {
                aspect-ratio: 1 / 0.8;
            }
            .keyboard-row {
                gap: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="theme-switch" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Dark Mode</span>
        </div>
        <a href="/"><span>🏠</span> Home</a>
        <a href="/news-clipper"><span>📰</span> News Clipper</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
        <a href="/cangjie"><span>🔣</span> 倉頡學堂</a>
        <a href="https://g.co/gemini/share/2668b53344d5" target="_blank"><span>🔣</span> 倉頡學堂 (Gemini)</a>
        <a href="https://gemini.google.com/share/97151a39e237" target="_blank"><span>🎭</span> Slide Translator (Gemini)</a>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="toast" class="toast"></div>

    <div class="container mx-auto px-2 pt-16 pb-4 max-w-2xl">
        <header class="text-center mb-3">
            <h1 class="text-2xl font-bold mb-1">倉頡學堂</h1>
            <p class="text-xs opacity-60">學習拆字：每個中文字都由基本字根組成</p>
        </header>

        <!-- Level Selection -->
        <div id="levelSelection" class="card p-4 rounded-xl" style="background: var(--card-bg); border: 1px solid var(--card-border);">
            <h2 class="text-lg font-semibold mb-3 text-center">選擇難度</h2>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="startGame(1)" class="p-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition text-sm">
                    <div class="text-xl mb-0.5">一</div>
                    <div class="text-xs opacity-80">Level 1</div>
                </button>
                <button onclick="startGame(2)" class="p-3 rounded-xl bg-purple-600 hover:bg-purple-700 text-white font-semibold transition text-sm">
                    <div class="text-xl mb-0.5">二</div>
                    <div class="text-xs opacity-80">Level 2</div>
                </button>
                <button onclick="startGame(3)" class="p-3 rounded-xl bg-green-600 hover:bg-green-700 text-white font-semibold transition text-sm">
                    <div class="text-xl mb-0.5">三</div>
                    <div class="text-xs opacity-80">Level 3</div>
                </button>
            </div>
        </div>

        <!-- Mode Selection -->
        <div id="modeSelection" class="card p-4 rounded-xl hidden" style="background: var(--card-bg); border: 1px solid var(--card-border);">
            <h2 class="text-lg font-semibold mb-3 text-center">選擇模式</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="startPractice()" class="p-3 rounded-xl bg-teal-600 hover:bg-teal-700 text-white font-semibold transition text-sm">
                    <div class="text-xl mb-0.5">📖</div>
                    <div>學習模式</div>
                </button>
                <button onclick="startTest()" class="p-3 rounded-xl bg-orange-600 hover:bg-orange-700 text-white font-semibold transition text-sm">
                    <div class="text-xl mb-0.5">✍️</div>
                    <div>測試模式</div>
                </button>
            </div>
            <button onclick="backToLevel()" class="mt-3 w-full py-2 rounded-lg bg-gray-600 hover:bg-gray-700 text-white text-sm">返回</button>
        </div>

        <!-- Game Area -->
        <div id="gameArea" class="hidden">
            <div class="mb-3">
                <div class="flex justify-between text-xs mb-1">
                    <span id="progressText">進度 1/10</span>
                    <span id="scoreText">得分: 0</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 10%"></div>
                </div>
            </div>

            <div class="text-center mb-3">
                <span id="stars" class="text-xl">
                    <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
                </span>
            </div>

            <div class="card p-4 rounded-xl mb-3" style="background: var(--card-bg); border: 1px solid var(--card-border);">
                <!-- The character to learn -->
                <div class="text-center mb-4">
                    <div class="text-6xl font-bold" id="questionChar">好</div>
                    <div class="text-xs opacity-60 mt-1">這是哪個字？</div>
                </div>
                
                <!-- Breakdown display (for learning) -->
                <div id="breakdownArea" class="mb-4 hidden">
                    <div class="text-center text-sm mb-2 opacity-70">字根拆解</div>
                    <div id="breakdownDisplay" class="breakdown-display"></div>
                </div>
                
                <!-- Hint (learning mode only) -->
                <div id="hintArea" class="text-center mb-3 hidden">
                    <span class="hint-text">完整編碼：<span id="hintText">日月 (BAA)</span></span>
                </div>
                
                <!-- User input area -->
                <div id="inputArea" class="input-area"></div>
                
                <!-- Keyboard -->
                <div class="keyboard-container">
                    <div id="keyboardArea" class="mb-2"></div>
                    <div class="flex gap-2">
                        <button onclick="clearInput()" class="flex-1 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-bold">清除</button>
                        <button onclick="backspace()" class="flex-1 py-2 rounded-lg bg-gray-600 hover:bg-gray-700 text-white text-sm font-bold">刪除</button>
                        <button onclick="submitAnswer()" class="flex-1 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-bold">送出</button>
                    </div>
                </div>
            </div>

            <button onclick="backToMode()" class="w-full py-2 rounded-lg bg-gray-600 hover:bg-gray-700 text-white text-sm">返回模式選擇</button>
        </div>

        <!-- Results -->
        <div id="results" class="card p-4 rounded-xl text-center hidden" style="background: var(--card-bg); border: 1px solid var(--card-border);">
            <h2 class="text-2xl font-bold mb-3">完成！</h2>
            <div class="text-4xl mb-3" id="resultStars">⭐⭐⭐</div>
            <div class="text-lg mb-2">得分: <span id="finalScore">0</span>/100</div>
            <div class="text-sm mb-3">正確率: <span id="accuracy">0</span>%</div>
            <div class="flex gap-2">
                <button onclick="restartGame()" class="flex-1 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-bold">再玩一次</button>
                <button onclick="backToLevel()" class="flex-1 py-3 rounded-lg bg-gray-600 hover:bg-gray-700 text-white font-bold">返回主頁</button>
            </div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentMode = 'practice';
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let answered = 0;
        let userInput = '';

        // Cangjie keyboard
        const KEYBOARD = [
            [
                {key: 'Q', radical: '手'},
                {key: 'W', radical: '田'},
                {key: 'E', radical: '水'},
                {key: 'R', radical: '口'},
                {key: 'T', radical: '廿'},
                {key: 'Y', radical: '卜'},
                {key: 'U', radical: '山'},
                {key: 'I', radical: '戈'},
                {key: 'O', radical: '人'},
                {key: 'P', radical: '心'}
            ],
            [
                {key: 'A', radical: '日'},
                {key: 'S', radical: '尸'},
                {key: 'D', radical: '木'},
                {key: 'F', radical: '火'},
                {key: 'G', radical: '土'},
                {key: 'H', radical: '竹'},
                {key: 'J', radical: '十'},
                {key: 'K', radical: '大'},
                {key: 'L', radical: '中'},
                {key: 'M', radical: '一'}
            ],
            [
                {key: 'Z', radical: '重'},
                {key: 'X', radical: '難'},
                {key: 'C', radical: '金'},
                {key: 'V', radical: '女'},
                {key: 'B', radical: '月'},
                {key: 'N', radical: '弓'}
            ]
        ];

        function initKeyboard() {
            const kb = document.getElementById('keyboardArea');
            kb.innerHTML = '';
            KEYBOARD.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                row.forEach(k => {
                    const btn = document.createElement('button');
                    btn.className = 'kb-key';
                    btn.innerHTML = `<span class="letter">${k.key}</span><span class="radical">${k.radical}</span>`;
                    btn.onclick = () => addChar(k.key);
                    rowDiv.appendChild(btn);
                });
                kb.appendChild(rowDiv);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        document.addEventListener('click', e => {
            const sb = document.getElementById('sidebar');
            const hb = document.querySelector('.hamburger');
            if (!sb.contains(e.target) && !hb.contains(e.target) && sb.classList.contains('active')) {
                sb.classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('theme-text').textContent = isLight ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-icon').textContent = '☀️';
            document.getElementById('theme-text').textContent = 'Light Mode';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + (type === 'correct' ? 'toast-correct' : 'toast-wrong');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function startGame(level) {
            currentLevel = level;
            document.getElementById('levelSelection').classList.add('hidden');
            document.getElementById('modeSelection').classList.remove('hidden');
        }

        function startPractice() {
            currentMode = 'practice';
            fetchQuestions();
        }

        function startTest() {
            currentMode = 'test';
            fetchQuestions();
        }

        function fetchQuestions() {
            fetch(`/cangjie/get_questions/${currentLevel}`)
                .then(r => r.json())
                .then(data => {
                    questions = data.questions;
                    currentIndex = 0;
                    score = 0;
                    answered = 0;
                    document.getElementById('modeSelection').classList.add('hidden');
                    document.getElementById('gameArea').classList.remove('hidden');
                    document.getElementById('results').classList.add('hidden');
                    showQuestion();
                })
                .catch(err => {
                    showToast('載入失敗', 'wrong');
                    console.error(err);
                });
        }

        function showQuestion() {
            if (currentIndex >= questions.length) {
                showResults();
                return;
            }
            const q = questions[currentIndex];
            userInput = '';
            clearInput(); // Physically clear the input display area
            
            // Show character
            document.getElementById('questionChar').textContent = q.char;
            
            // Show breakdown in practice mode
            if (currentMode === 'practice') {
                document.getElementById('breakdownArea').classList.remove('hidden');
                document.getElementById('hintArea').classList.remove('hidden');
                
                // Build breakdown display
                const bd = document.getElementById('breakdownDisplay');
                bd.innerHTML = '';
                
                // Show the full code at top as hint
                document.getElementById('hintText').textContent = q.code;
                
                // Build individual key parts
                const parts = q.parts || [q.code];
                parts.forEach((p, idx) => {
                    const div = document.createElement('div');
                    div.className = 'breakdown-char';
                    div.innerHTML = `
                        <div class="the-code">${p}</div>
                        <div class="the-char">${q.char[idx] || ''}</div>
                    `;
                    bd.appendChild(div);
                });
            } else {
                document.getElementById('breakdownArea').classList.add('hidden');
                document.getElementById('hintArea').classList.add('hidden');
            }
            
            updateInputDisplay();
            updateProgress();
        }

        function addChar(c) {
            userInput += c;
            updateInputDisplay();
        }

        function clearInput() {
            userInput = '';
            updateInputDisplay();
        }

        function backspace() {
            userInput = userInput.slice(0, -1);
            updateInputDisplay();
        }

        function updateInputDisplay() {
            const area = document.getElementById('inputArea');
            const q = questions[currentIndex];
            if (!q) return;
            
            const codeLen = q.code.length;
            let html = '';
            for (let i = 0; i < codeLen; i++) {
                if (i < userInput.length) {
                    html += `<div class="input-char">${userInput[i].toUpperCase()}</div>`;
                } else {
                    html += `<div class="input-placeholder"></div>`;
                }
            }
            area.innerHTML = html;
        }

        function submitAnswer() {
            if (!userInput) return;

            const q = questions[currentIndex];
            const isCorrect = userInput.toUpperCase() === q.code.toUpperCase();

            answered++;
            if (isCorrect) {
                score += 10;
                showToast('答啱啦！', 'correct');
            } else {
                showToast(`答案：${q.code}`, 'wrong');
            }

            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, isCorrect ? 1000 : 2000);
        }

        function updateProgress() {
            const pct = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `進度 ${currentIndex + 1}/${questions.length}`;
            document.getElementById('scoreText').textContent = `得分: ${score}`;
            
            const starsNeeded = [0, 50, 70, 90, 100];
            const starsHtml = [0, 1, 2, 3, 4].map(i => 
                `<span class="star ${score >= starsNeeded[i] ? '' : 'empty'}">${score >= starsNeeded[i] ? '⭐' : '☆'}</span>`
            ).join('');
            document.getElementById('stars').innerHTML = starsHtml;
        }

        function showResults() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            
            const accuracy = Math.round((score / (questions.length * 10)) * 100);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('accuracy').textContent = accuracy;
            
            let stars = accuracy >= 90 ? 5 : accuracy >= 70 ? 4 : accuracy >= 50 ? 3 : accuracy >= 30 ? 2 : 1;
            document.getElementById('resultStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
        }

        function backToLevel() {
            document.getElementById('levelSelection').classList.remove('hidden');
            document.getElementById('modeSelection').classList.add('hidden');
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
        }

        function backToMode() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('modeSelection').classList.remove('hidden');
        }

        function restartGame() {
            fetchQuestions();
        }

        // Physical keyboard support
        document.addEventListener('keydown', e => {
            const gameArea = document.getElementById('gameArea');
            if (gameArea.classList.contains('hidden')) return;
            
            const key = e.key.toUpperCase();
            if ('QWERTYUIOPASDFGHJKLZXCVBNM'.includes(key)) {
                addChar(key);
            } else if (e.key === 'Backspace') {
                backspace();
            } else if (e.key === 'Enter') {
                submitAnswer();
            } else if (e.key === 'Escape') {
                clearInput();
            }
        });

        initKeyboard();
    </script>
</body>
</html>
