<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通話發音練習 - 語音檢測</title>
    <link rel="stylesheet" href="/static/pronunciation.css">
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.25.0/dist/index.js"></script>
</head>
<body>
    <!-- Hamburger -->
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">App Menu</div>
        <a href="/geckolab"><span>🦎</span> Geckolab</a>
        <a href="/cangjie"><span>🔣</span> 倉頡學堂</a>
        <a href="/news-clipper"><span>📰</span> News Clipper</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
        <a href="/pronunciation"><span>🗣️</span> 普通話發音練習</a>
        <a href="/"><span>🏠</span> About</a>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        <!-- Back link -->
        <a href="/" class="back-link">← 返回主頁</a>

        <!-- Header -->
        <header class="app-header">
            <h1>🗣️ 普通話發音練習 <span class="version-tag">{{ version }}</span></h1>
            <p class="subtitle">讀出句子，即時睇下邊啲字讀得啱！</p>
        </header>

        <!-- Passage Selector -->
        <section class="passage-selector">
            <label for="passage-select">選擇篇章：</label>
            <select id="passage-select" onchange="onPassageChange()">
                {% for p in passages %}
                <option value="{{ p.id }}" {% if loop.first %}selected{% endif %}>
                    {{ p.id }}. {{ p.title }}
                </option>
                {% endfor %}
            </select>
            <button id="edit-passage-btn" class="btn-edit-passage" onclick="openEditModal()" title="編輯篇章文字">✏️ 編輯</button>
        </section>

        <!-- Edit Passage Modal -->
        <div class="modal-overlay" id="edit-modal-overlay" style="display:none;" onclick="closeEditModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h2>✏️ 編輯篇章文字</h2>
                <p class="modal-subtitle" id="edit-modal-title"></p>
                <textarea id="edit-passage-textarea" rows="6" placeholder="請輸入篇章文字..."></textarea>
                <div class="modal-buttons">
                    <button class="btn-save" onclick="saveEdit()">💾 儲存</button>
                    <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                    <button class="btn-reset-default" onclick="resetToDefault()">🔄 還原預設</button>
                </div>
            </div>
        </div>

        <!-- Score Bar -->
        <div class="score-bar" id="score-bar" style="display:none;">
            <div class="score-item correct-count">
                <span class="score-label">✅ 正確</span>
                <span class="score-value" id="correct-count">0</span>
            </div>
            <div class="score-item wrong-count">
                <span class="score-label">❌ 錯誤</span>
                <span class="score-value" id="wrong-count">0</span>
            </div>
            <div class="score-item accuracy">
                <span class="score-label">準確度</span>
                <span class="score-value" id="accuracy">0%</span>
            </div>
        </div>

        <!-- Passage Display -->
        <section class="passage-display" id="passage-display"></section>

        <!-- Recognized text display -->
        <div class="recognized-section" id="recognized-section" style="display:none;">
            <h3>我聽到你讀：</h3>
            <p class="recognized-text" id="recognized-text"></p>
        </div>

        <!-- Controls -->
        <section class="controls">
            <button id="record-btn" class="btn-record" onclick="toggleRecording()">
                <span class="btn-icon">🎤</span>
                <span class="btn-text">開始錄音</span>
            </button>
            <button id="play-btn" class="btn-play" onclick="playTTS()" title="聽正確發音">
                <span class="btn-icon">🔊</span>
                <span class="btn-text">聽示範</span>
            </button>
            <button id="pause-btn" class="btn-pause" onclick="togglePauseTTS()" title="暫停/繼續" style="display:none;">
                <span class="btn-icon">⏯️</span>
                <span class="btn-text">暫停</span>
            </button>
            <button id="stop-tts-btn" class="btn-stop-tts" onclick="stopTTS()" title="停止播放" style="display:none;">
                <span class="btn-icon">⏹️</span>
                <span class="btn-text">停止</span>
            </button>
            <button id="reset-btn" class="btn-reset" onclick="resetAll()">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">重設</span>
            </button>
        </section>

        <!-- Status -->
        <div class="status-bar" id="status-bar">
            <span class="status-dot"></span>
            <span class="status-text">準備就緒 — 選擇篇章後按「開始錄音」</span>
        </div>

        <!-- Browser warning -->
        <div class="browser-warning" id="browser-warning" style="display:none;">
            <p>⚠️ 請使用 <strong>Chrome</strong> 或 <strong>Edge</strong> 瀏覽器開啟此應用程式，先可以使用語音辨識功能。</p>
        </div>
    </div>

    <script>
        const PASSAGES = {{ passages | tojson }};

        // Known polyphone corrections for these passages
        const PINYIN_FIX = {
            // 於: wū → yú (形成於, 對...於)
            // 重: zhòng → chóng (重用 = reuse)
            // 卷: juàn → juǎn (卷上天空 = sweep up)
        };

        function fixPolyphone(pinyins, text) {
            const chars = text.split('');
            const fixed = [...pinyins];
            for (let i = 0; i < chars.length; i++) {
                if (chars[i] === '於' && fixed[i] === 'wū') fixed[i] = 'yú';
                if (chars[i] === '重' && fixed[i] === 'zhòng') {
                    if (chars[i+1] === '用' || chars[i+1] === '新') fixed[i] = 'chóng';
                }
                if (chars[i] === '卷' && fixed[i] === 'juàn') {
                    if (chars[i+1] === '上' || chars[i-1] === '席') fixed[i] = 'juǎn';
                }
            }
            return fixed;
        }

        function getPinyin(text) {
            try {
                const raw = pinyinPro.pinyin(text, { toneType: 'symbol', type: 'array' });
                return fixPolyphone(raw, text);
            } catch(e) {
                return text.split('').map(() => '');
            }
        }

        let currentPassageId = 1;
        let recognition = null;
        let isRecording = false;
        let interim = '';  // latest interim only
        let finalTranscript = '';
        let charMatched = [];  // track match state for each char (per Gemini approach)

        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('browser-warning').style.display = 'block';
                document.getElementById('record-btn').disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                updateStatus('recording', '🎤 收聽中... 請大聲朗讀！');
                document.getElementById('record-btn').classList.add('recording');
                document.getElementById('record-btn').querySelector('.btn-text').textContent = '停止錄音';
            };

            recognition.onsoundstart = () => {
                updateStatus('recording', '🔊 聽到聲音...');
            };

            recognition.onsoundend = () => {
                updateStatus('recording', '🎤 收聽中... 請繼續朗讀');
            };

            recognition.onspeechstart = () => {
                updateStatus('recording', '🗣️ 辨識中...');
            };

            recognition.onspeechend = () => {
                updateStatus('recording', '🎤 收聽中...');
            };

            recognition.onend = () => {
                // Restarts the recognition if the user hasn't manually stopped it
                if (isRecording) {
                    try { recognition.start(); } catch(e) {
                        setTimeout(() => { if(isRecording) recognition.start(); }, 200);
                    }
                } else {
                    finalizeComparison();
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') {
                    updateStatus('warning', '聽唔到聲音，請再試下...');
                } else if (event.error === 'audio-capture') {
                    updateStatus('error', '❌ 無法使用咪高峰，請檢查權限');
                } else if (event.error === 'not-allowed') {
                    updateStatus('error', '❌ 請允許瀏覽器使用咪高峰');
                } else if (event.error !== 'aborted') {
                    updateStatus('error', '錯誤: ' + event.error);
                }
            };

            recognition.onresult = (event) => {
                let newInterim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        newInterim += event.results[i][0].transcript;
                    }
                }
                interim = newInterim;
                const currentText = finalTranscript + interim;

                // Clean display text
                const displayText = currentText.replace(/[^\u4e00-\u9fff\u3002\uff0c\uff1f\uff01]/g, '');
                document.getElementById('recognized-text').textContent = displayText || '(等待中...)';
                document.getElementById('recognized-section').style.display = 'block';

                compareText(currentText, false);
            };
        }

        function cleanText(text) {
            return text.replace(/[，。！？、！？：；「」『』（）\s\.\,\!\?\:\;\-]/g, '');
        }

        function isPunct(ch) {
            return /[，。！？、！？：；「」『』（）\s]/.test(ch);
        }

        // Remove non-Chinese junk and de-duplicate consecutive repeated chars (common STT artifact)
        function filterChinese(text) {
            return text.replace(/[^\u4e00-\u9fff\u3002\uff0c\uff1f\uff01\u3001\uff1a\uff1b\u201c\u201d\u2018\u2019\uff08\uff09\s]/g, '')
                       .replace(/(.)\1+/g, '$1');  // dedup: "呆呆呆" → "呆"
        }

        function stripTone(py) {
            return (py || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function pinyinMatch(a, b) {
            if (!a || !b) return a === b;
            if (a === b) return true;
            // Strip tone marks and compare (lenient mode for Mandarin practice)
            return stripTone(a) === stripTone(b);
        }

        /**
         * Optimized Matcher:
         * Uses a greedy sequential search to allow for pauses or stutters
         */
        function compareText(recognized, isFinal) {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            const expected = passage.text;
            const expectedPinyins = getPinyin(expected);

            // Remove all non-Chinese characters for the comparison engine
            const cleanRecText = recognized.replace(/[^\u4e00-\u9fff]/g, '');

            const expChars = [];
            for (let i = 0; i < expected.length; i++) {
                if (!isPunct(expected[i])) expChars.push(expected[i]);
            }

            if (charMatched.length !== expChars.length) {
                charMatched = new Array(expChars.length).fill(false);
            }

            // Greedy Sequential Search:
            // Finds the next required character anywhere further in the recognized stream.
            let streamPtr = 0;
            for (let i = 0; i < expChars.length; i++) {
                const foundIdx = cleanRecText.indexOf(expChars[i], streamPtr);
                if (foundIdx !== -1) {
                    charMatched[i] = true;
                    streamPtr = foundIdx + 1; // Move pointer forward
                }
            }

            const correctCount = charMatched.filter(Boolean).length;
            updateScore(correctCount, isFinal ? expChars.length - correctCount : 0);

            renderPassageWithStatus(expected, expectedPinyins, charMatched, isFinal);
        }

        function showLiveProgress(currentText) {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            const expectedLen = cleanText(passage.text).length;
            const recognizedLen = cleanText(currentText).length;
            const pct = expectedLen > 0 ? Math.min(100, Math.round((recognizedLen / expectedLen) * 100)) : 0;
            if (recognizedLen > 0) {
                updateStatus('recording', '🗣️ 已辨識約 ' + recognizedLen + ' 字 (' + pct + '%) — 繼續朗讀...');
            }
        }

        function renderPassageWithStatus(text, pinyins, matchArray, isFinal) {
            const display = document.getElementById('passage-display');
            let html = '<div class="char-grid">';
            let charIdx = 0;

            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const isPunctuation = isPunct(ch);
                const py = i < pinyins.length ? pinyins[i] : '';

                if (isPunctuation) {
                    html += '<div class="char-cell punctuation"><span class="pinyin"></span><span class="char">' + ch + '</span></div>';
                } else {
                    const isCorrect = matchArray[charIdx];
                    const status = isCorrect ? 'correct' : (isFinal ? 'incorrect' : 'pending');
                    html += '<div class="char-cell ' + status + '" onclick="speakChar(\'' + ch + '\')">' +
                            '<span class="pinyin">' + (py === ch ? '' : py) + '</span>' +
                            '<span class="char">' + ch + '</span></div>';
                    charIdx++;
                }
            }
            html += '</div>';
            display.innerHTML = html;
        }

        function renderPassageInitial(text) {
            const pinyins = getPinyin(text);
            const display = document.getElementById('passage-display');
            let html = '<div class="char-grid">';
            let firstChar = true;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const isPunctuation = /[，。！？、！？：；「」『』（）\s]/.test(ch);
                const rawPinyin = i < pinyins.length ? pinyins[i] : '';
                const showPinyin = isPunctuation ? '' : (rawPinyin === ch ? '' : rawPinyin);
                let extraClass = '';
                if (!isPunctuation && firstChar) {
                    extraClass = ' reading-pos';
                    firstChar = false;
                }
                html += '<div class="char-cell ' + (isPunctuation ? 'punctuation' : 'pending') + extraClass + '"' + (isPunctuation ? '' : ' onclick="speakChar(\'' + ch + '\')" title="撳我聽發音"') + '><span class="pinyin">' + showPinyin + '</span><span class="char">' + ch + '</span></div>';
            }
            html += '</div>';
            display.innerHTML = html;
        }

        function updateScore(correct, wrong) {
            const total = correct + wrong;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('wrong-count').textContent = wrong;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('score-bar').style.display = 'flex';
        }

        function updateStatus(type, message) {
            const bar = document.getElementById('status-bar');
            bar.querySelector('.status-dot').className = 'status-dot ' + type;
            bar.querySelector('.status-text').textContent = message;
        }

        function finalizeComparison() {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            compareText(finalTranscript, true);

            const total = charMatched.length;
            const correct = charMatched.filter(Boolean).length;
            const acc = total > 0 ? Math.round((correct / total) * 100) : 0;

            updateStatus('ready', '✅ 練習完成！準確度：' + acc + '% (' + correct + '/' + total + ')');
            document.getElementById('record-btn').classList.remove('recording');
            document.getElementById('record-btn').querySelector('.btn-text').textContent = '開始錄音';
        }

        function toggleRecording() {
            if (!recognition) setupRecognition();
            if (!isRecording) {
                // Reset for new session
                finalTranscript = '';
                interim = '';
                charMatched = [];
                isRecording = true;
                recognition.start();
                document.getElementById('record-btn').querySelector('.btn-text').textContent = '停止錄音';
                document.getElementById('record-btn').classList.add('recording');
                document.getElementById('score-bar').style.display = 'none';
                const passage = PASSAGES.find(p => p.id === currentPassageId);
                renderPassageWithStatus(passage.text, getPinyin(passage.text), [], false);
                updateStatus('recording', '🎤 收聽中... 請按順序朗讀');
            } else {
                isRecording = false;
                recognition.stop();
            }
        }

        let ttsPlaying = false;
        let ttsPaused = false;
        let ttsCharPos = 0;       // character offset for subtitle restart
        let ttsTracker = null;    // interval timer for position tracking

        function updateTTSButtons(state) {
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const stopBtn = document.getElementById('stop-tts-btn');
            if (state === 'playing') {
                playBtn.style.display = 'none';
                pauseBtn.style.display = 'inline-flex';
                stopBtn.style.display = 'inline-flex';
                pauseBtn.querySelector('.btn-text').textContent = '暫停';
                pauseBtn.querySelector('.btn-icon').textContent = '⏸️';
            } else if (state === 'paused') {
                pauseBtn.querySelector('.btn-text').textContent = '繼續';
                pauseBtn.querySelector('.btn-icon').textContent = '▶️';
            } else {
                playBtn.style.display = 'inline-flex';
                pauseBtn.style.display = 'none';
                stopBtn.style.display = 'none';
            }
        }

        function speakPassage(text, startPos) {
            // 1. 強制停止當前所有語音
            window.speechSynthesis.cancel();
            clearInterval(ttsTracker);

            // 2. 稍微延遲，確保 Chrome 的語音引擎已重置
            setTimeout(() => {
                // 從 startPos 開始切割字串
                const toSpeak = text.substring(startPos);
                const utterance = new SpeechSynthesisUtterance(toSpeak);

                utterance.lang = 'zh-CN';
                utterance.rate = 0.85;

                // 語音選擇
                const voices = window.speechSynthesis.getVoices();
                const mandarinVoice = voices.find(v => v.lang.includes('zh-CN')) || voices[0];
                if (mandarinVoice) utterance.voice = mandarinVoice;

                // 【核心修正】精確紀錄當前讀到的字
                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        // 當前總進度 = 這次片段的起始點 + 這次片段讀到的位移
                        ttsCharPos = startPos + event.charIndex;
                    }
                };

                utterance.onstart = () => {
                    ttsPlaying = true;
                    ttsPaused = false;
                    updateStatus('playing', '🔊 播放示範中...');
                    updateTTSButtons('playing');
                };

                utterance.onend = () => {
                    // 如果不是因為按了「暫停」而停止，就重設所有狀態
                    if (!ttsPaused) {
                        ttsPlaying = false;
                        ttsCharPos = 0;
                        updateTTSButtons('stop');
                        updateStatus('ready', '示範完畢');
                    }
                };

                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function playTTS() {
            if (ttsPaused) {
                togglePauseTTS();
                return;
            }
            // 全新播放，從 0 開始
            ttsCharPos = 0;
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            speakPassage(passage.text, 0);
        }

        function togglePauseTTS() {
            if (!window.speechSynthesis) return;
            const passage = PASSAGES.find(p => p.id === currentPassageId);

            if (ttsPlaying) {
                // 按下暫停：標記為暫停狀態，取消目前語音
                ttsPaused = true;
                ttsPlaying = false;
                window.speechSynthesis.cancel();

                updateStatus('playing', '⏸️ 已暫停 — 按「繼續」繼續');
                updateTTSButtons('paused');
            } else if (ttsPaused) {
                // 按下繼續：從記錄好的 ttsCharPos 再次呼叫 speakPassage
                // 此時 speakPassage 內的 substring(startPos) 就會發揮作用
                speakPassage(passage.text, ttsCharPos);
            }
        }

        function stopTTS() {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            clearInterval(ttsTracker);
            ttsPlaying = false;
            ttsPaused = false;
            ttsCharPos = 0;
            updateTTSButtons('stop');
            updateStatus('ready', '準備就緒 — 按「開始錄音」練習');
        }

        function speakChar(ch) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(ch);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.75;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            const voices = window.speechSynthesis.getVoices();
            const mandarinVoice = voices.find(v =>
                v.lang === 'zh-CN' || v.lang.startsWith('zh-CN-') ||
                v.lang === 'zh-TW' || v.lang.startsWith('zh-TW-')
            );
            if (mandarinVoice) utterance.voice = mandarinVoice;
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 30);
        }

        function resetAll() {
            if (isRecording) { isRecording = false; if (recognition) recognition.stop(); }
            // Stop any TTS
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            clearInterval(ttsTracker);
            ttsPlaying = false; ttsPaused = false; ttsCharPos = 0;
            updateTTSButtons('stop');
            finalTranscript = ''; charStatuses = []; charMatched = [];
            document.getElementById('recognized-text').textContent = '';
            document.getElementById('recognized-section').style.display = 'none';
            document.getElementById('score-bar').style.display = 'none';
            document.getElementById('record-btn').classList.remove('recording');
            document.getElementById('record-btn').querySelector('.btn-text').textContent = '開始錄音';
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            renderPassageInitial(passage.text);
            updateStatus('ready', '準備就緒 — 選擇篇章後按「開始錄音」');
        }

        // (passage change handled by inline onchange="onPassageChange()")

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleRecording();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            setupRecognition();
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            renderPassageWithStatus(passage.text, getPinyin(passage.text), [], false);
        });

        // Sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // ==================== PASSAGE EDITING ====================
        // Load saved passages from localStorage on init
        function loadSavedPassages() {
            const saved = localStorage.getItem('pronunciation_passages');
            if (saved) {
                try {
                    const edits = JSON.parse(saved);
                    for (let i = 0; i < PASSAGES.length; i++) {
                        if (edits[i] && edits[i].text) {
                            PASSAGES[i].text = edits[i].text;
                            if (edits[i].title) PASSAGES[i].title = edits[i].title;
                        }
                    }
                } catch(e) {}
            }
            // Update dropdown titles
            updateDropdownTitles();
        }

        function updateDropdownTitles() {
            const select = document.getElementById('passage-select');
            for (let i = 0; i < select.options.length; i++) {
                select.options[i].text = (i+1) + '. ' + PASSAGES[i].title;
            }
        }

        function openEditModal() {
            const idx = currentPassageId - 1;
            document.getElementById('edit-modal-title').textContent = '主題：' + PASSAGES[idx].title;
            document.getElementById('edit-passage-textarea').value = PASSAGES[idx].text;
            document.getElementById('edit-modal-overlay').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal-overlay').style.display = 'none';
        }

        function saveEdit() {
            const idx = currentPassageId - 1;
            const newText = document.getElementById('edit-passage-textarea').value.trim();
            if (!newText) { alert('文字不能為空！'); return; }
            PASSAGES[idx].text = newText;
            // Save to localStorage
            const edits = {};
            for (let i = 0; i < PASSAGES.length; i++) {
                edits[i] = { title: PASSAGES[i].title, text: PASSAGES[i].text };
            }
            localStorage.setItem('pronunciation_passages', JSON.stringify(edits));
            closeEditModal();
            resetAll();
            updateStatus('ready', '✅ 篇章已儲存！');
        }

        function resetToDefault() {
            const idx = currentPassageId - 1;
            if (!confirm('確定要還原「' + PASSAGES[idx].title + '」為預設文字？')) return;
            const defaults = {{ passages | tojson }};
            PASSAGES[idx].text = defaults[idx].text;
            PASSAGES[idx].title = defaults[idx].title;
            // Update localStorage
            const edits = {};
            for (let i = 0; i < PASSAGES.length; i++) {
                edits[i] = { title: PASSAGES[i].title, text: PASSAGES[i].text };
            }
            localStorage.setItem('pronunciation_passages', JSON.stringify(edits));
            closeEditModal();
            resetText();
            updateDropdownTitles();
            updateStatus('ready', '🔄 已還原為預設文字');
        }

        function onPassageChange() {
            currentPassageId = parseInt(document.getElementById('passage-select').value);
            resetAll();
        }

        // Load saved passages on page load
        loadSavedPassages();
    </script>
</body>
</html>
