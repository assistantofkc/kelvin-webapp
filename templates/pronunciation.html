<!DOCTYPE html>
<html lang="zh-HK">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>小朋友普通話發音練習</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.25.0/dist/index.js"></script>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
 body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
 .char-unit {
 display: inline-flex; flex-direction: column; align-items: center;
 margin: 6px 4px; padding: 8px; border-radius: 12px;
 background: white; border: 2px solid #e2e8f0; transition: all 0.2s;
 min-width: 60px; vertical-align: bottom;
 }
 .pinyin { font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 2px; font-family: 'Arial', sans-serif; }
 .zh-char { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
 .status-correct { background-color: #d1fae5; border-color: #10b981; color: #064e3b; }
 .status-correct .pinyin { color: #059669; }
 .status-incorrect { background-color: #fee2e2; border-color: #f87171; color: #991b1b; }
 .status-incorrect .pinyin { color: #dc2626; }
 .punctuation { font-size: 1.8rem; color: #cbd5e1; align-self: flex-end; margin: 0 4px 10px 4px; }
 .recording-pulse { animation: pulse 1.5s infinite; }
 @keyframes pulse {
 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
 70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
 }
 </style>
</head>
<body class="p-4 md:p-8">
 <div class="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-blue-50">
 <header class="bg-blue-600 p-8 text-white text-center">
 <h1 class="text-3xl font-bold">🗣️ 普通話發音練習</h1>
 <p class="mt-2 opacity-90">錄音時會自動重啟，請放心慢慢讀</p>
 <p class="mt-1 opacity-70 text-sm">v1.07</p>
 </header>

 <div class="p-6">
 <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
 <button onclick="changePassage(0)" class="passage-btn p-3 rounded-xl border-2 border-blue-100 hover:bg-blue-50 transition text-sm font-bold">主題一：餃子</button>
 <button onclick="changePassage(1)" class="passage-btn p-3 rounded-xl border-2 border-blue-100 hover:bg-blue-50 transition text-sm font-bold">主題二：魚丸</button>
 <button onclick="changePassage(2)" class="passage-btn p-3 rounded-xl border-2 border-blue-100 hover:bg-blue-50 transition text-sm font-bold">主題三：颱風</button>
 <button onclick="changePassage(3)" class="passage-btn p-3 rounded-xl border-2 border-blue-100 hover:bg-blue-50 transition text-sm font-bold">主題四：環保</button>
 </div>

 <div id="display-container" class="bg-slate-50 p-6 md:p-10 rounded-[2rem] min-h-[350px] shadow-inner mb-8 flex flex-wrap justify-center items-end"></div>

 <div class="flex flex-wrap justify-center gap-4">
 <button id="btn-tts" onclick="playSample()" class="px-8 py-4 bg-orange-400 text-white rounded-full font-bold shadow-lg hover:bg-orange-500 transition active:scale-95">🔊 聽範讀</button>
 <button id="btn-record" onclick="toggleRecording()" class="px-10 py-4 bg-blue-600 text-white rounded-full font-bold shadow-xl hover:bg-blue-700 transition active:scale-95">
 <span id="record-icon">🎤</span> <span id="record-text">開始錄音</span>
 </button>
 <button onclick="resetText()" class="px-8 py-4 bg-gray-400 text-white rounded-full font-bold shadow-lg hover:bg-gray-500 transition active:scale-95">🔄 重試</button>
 </div>

 <div id="status-bar" class="text-center mt-8 text-blue-600 font-bold text-lg min-h-[1.5rem]"></div>
 <div id="live-text" class="text-center mt-2 text-gray-400 italic text-sm"></div>
 </div>
 </div>

 <script>
 const { pinyin } = pinyinPro;
 const PASSAGES = [
 "餃子是我婆婆的中餐拿手菜，叫粟米紅蘿蔔豬肉餃子。內裡的豬肉鮮甜多汁和皮很薄，我很喜歡吃，每天早上都會吃它做早餐。",
 "今天我要介紹的香港街頭小食是魚丸，是一種很常見也很美味的小食，它很軟和彈牙，價錢也很便宜。辣辣的咖哩汁和魚丸簡直是絕配啊！",
 "我今天要介紹的一種極端天氣就是颱風，它形成於熱帶的海洋，它會一直旋轉直到它化解，並令到它旁邊的各種物件卷上天空，造成人命傷亡，所以很危險的啊！",
 "我要分享的一個環保好方法，就是會用舊襯衣重用做毛巾，在家中廚房需要經常抹油污，就可以用這些舊襯衣代替即棄紙巾，我覺得這種是很好的一個環保方法。"
 ];

 let currentIdx = 0;
 let isRecording = false;
 let recognition = null;
 let cumulativeTranscript = "";
 let charMatched = [];  // track match state for each char

 function setupRecognition() {
 const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
 if (!SpeechRecognition) return alert("請使用 Chrome 瀏覽器以支援語音功能");

 recognition = new SpeechRecognition();
 recognition.lang = 'zh-CN';
 recognition.continuous = true;
 recognition.interimResults = true;

 recognition.onstart = () => updateStatus("👂 正在聽... 請大聲讀出文字");

 recognition.onresult = (event) => {
 let interim = "";
 for (let i = event.resultIndex; i < event.results.length; ++i) {
 if (event.results[i].isFinal) {
 cumulativeTranscript += event.results[i][0].transcript;
 } else {
 interim += event.results[i][0].transcript;
 }
 }
 const fullText = cumulativeTranscript + interim;
 document.getElementById('live-text').textContent = "偵測到：" + fullText;
 compareAndHighlight(fullText);
 };

 recognition.onend = () => {
 // CRITICAL: auto-restart if user hasn't stopped
 if (isRecording) {
 console.log("偵測到中斷，正在自動重啟...");
 try { recognition.start(); } catch(e) {
 setTimeout(() => { try { recognition.start(); } catch(e2) {} }, 200);
 }
 } else {
 finalizeResult();
 }
 };
 }

 function renderText() {
 const container = document.getElementById('display-container');
 container.innerHTML = '';
 const units = document.querySelectorAll('.char-unit');
 charMatched = new Array(units.length).fill(false);
 const data = pinyin(PASSAGES[currentIdx], { type: 'all', toneType: 'symbol', nonZh: 'consecutive' });

 data.forEach(item => {
 if (/[，。！？、]/.test(item.origin)) {
 const span = document.createElement('span');
 span.className = 'punctuation';
 span.textContent = item.origin;
 container.appendChild(span);
 } else if (item.origin.trim()) {
 const div = document.createElement('div');
 div.className = 'char-unit';
 div.dataset.char = item.origin;
 div.innerHTML = `<span class="pinyin">${item.pinyin}</span><span class="zh-char">${item.origin}</span>`;
 container.appendChild(div);
 }
 });
 }

 /**
 * Linear scan matching — each recognized char advances the pointer sequentially.
 * This prevents repeated chars (e.g. multiple "的") from being matched out-of-order.
 */
 function compareAndHighlight(transcript) {
 const cleanText = transcript.replace(/[，。！？、\s]/g, '');
 const units = document.querySelectorAll('.char-unit');

 // Linear scan: walk through expected chars and try to match recognized chars in order
 let ri = 0;  // read pointer into cleanText
 for (let ei = 0; ei < units.length && ri < cleanText.length; ei++) {
 const expectedChar = units[ei].dataset.char;
 const recChar = cleanText[ri];
 if (expectedChar === recChar) {
 // Match — mark green, advance both pointers
 if (!charMatched[ei]) {
 charMatched[ei] = true;
 units[ei].classList.add('status-correct');
 units[ei].classList.remove('status-incorrect');
 }
 ri++;
 } else {
 // No match — don't advance ri, leave as pending (could be STT noise or misread)
 // Don't mark wrong yet during live recording — do it only in finalizeResult
 ri++;  // skip STT noise char
 }
 }
 // During live recording: also highlight any chars that appear in sequence
 // (even if some chars were skipped, as long as they're in order)
 // Reset and re-scan for progressive highlighting
 ri = 0;
 for (let ei = 0; ei < units.length; ei++) {
 if (charMatched[ei]) continue;  // already matched
 if (ri >= cleanText.length) break;
 const expectedChar = units[ei].dataset.char;
 // Find this char somewhere ahead in recognized text (permissive live mode)
 const ahead = cleanText.indexOf(expectedChar, ri);
 if (ahead !== -1 && ahead - ri < cleanText.length) {
 // Found in-sequence, mark it
 charMatched[ei] = true;
 units[ei].classList.add('status-correct');
 units[ei].classList.remove('status-incorrect');
 ri = ahead + 1;
 }
 }
 }

 function finalizeResult() {
 const units = document.querySelectorAll('.char-unit');
 let correct = 0;
 units.forEach((u, idx) => {
 if (charMatched[idx]) {
 correct++;
 } else {
 u.classList.remove('status-correct');
 u.classList.add('status-incorrect');
 }
 });
 const score = Math.round((correct / units.length) * 100);
 updateStatus(`🏁 完成！準確率：${score}% (${correct}/${units.length})`);
 }

 function playSample() {
 window.speechSynthesis.cancel();
 const utterance = new SpeechSynthesisUtterance(PASSAGES[currentIdx]);
 utterance.lang = 'zh-CN';
 utterance.rate = 0.8;
 window.speechSynthesis.speak(utterance);
 }

 function updateUI(recording) {
 const btn = document.getElementById('btn-record');
 document.getElementById('record-text').textContent = recording ? "停止錄音" : "開始錄音";
 document.getElementById('record-icon').textContent = recording ? "⏹️" : "🎤";
 btn.className = recording ?
 "px-10 py-4 bg-red-600 text-white rounded-full font-bold shadow-xl recording-pulse transition" :
 "px-10 py-4 bg-blue-600 text-white rounded-full font-bold shadow-xl hover:bg-blue-700 transition";
 }

 function changePassage(i) {
 currentIdx = i;
 resetText();
 document.querySelectorAll('.passage-btn').forEach((b, idx) => {
 b.classList.toggle('bg-blue-600', idx === i);
 b.classList.toggle('text-white', idx === i);
 });
 }

 function toggleRecording() {
 if (!recognition) setupRecognition();
 if (isRecording) {
 isRecording = false;
 try { recognition.stop(); } catch(e) {}
 updateUI(false);
 } else {
 isRecording = true;
 cumulativeTranscript = "";
 charMatched = new Array(document.querySelectorAll('.char-unit').length).fill(false);
 resetHighlights();
 recognition.start();
 updateUI(true);
 }
 }

 function resetText() {
 isRecording = false;
 if(recognition) { try { recognition.stop(); } catch(e) {} }
 cumulativeTranscript = "";
 charMatched = [];
 renderText();
 updateUI(false);
 updateStatus("準備就緒");
 document.getElementById('live-text').textContent = "";
 }

 function resetHighlights() {
 document.querySelectorAll('.char-unit').forEach(u => {
 u.className = 'char-unit';
 });
 }

 function updateStatus(msg) { document.getElementById('status-bar').textContent = msg; }

 window.onload = () => {
 changePassage(0);
 window.speechSynthesis.getVoices();
 };
 </script>
</body>
</html>
