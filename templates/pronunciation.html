<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通話發音練習 - 語音檢測</title>
    <link rel="stylesheet" href="/static/pronunciation.css">
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.25.0/dist/index.js"></script>
</head>
<body>
    <!-- Hamburger -->
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">App Menu</div>
        <a href="/geckolab"><span>🦎</span> Geckolab</a>
        <a href="/cangjie"><span>🔣</span> 倉頡學堂</a>
        <a href="/news-clipper"><span>📰</span> News Clipper</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
        <a href="/pronunciation"><span>🗣️</span> 普通話發音練習</a>
        <a href="/"><span>🏠</span> About</a>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        <a href="/" class="back-link">← 返回主頁</a>

        <header class="app-header">
            <h1>🗣️ 普通話發音練習 <span class="version-tag">{{ version }}</span></h1>
            <p class="subtitle">錄音後由 Azure AI 分析聲母、韻母、聲調</p>
        </header>

        <!-- Passage Selector -->
        <section class="passage-selector">
            <label for="passage-select">選擇篇章：</label>
            <select id="passage-select" onchange="onPassageChange()">
                {% for p in passages %}
                <option value="{{ p.id }}" {% if loop.first %}selected{% endif %}>
                    {{ p.id }}. {{ p.title }}
                </option>
                {% endfor %}
            </select>
            <button id="edit-passage-btn" class="btn-edit-passage" onclick="openEditModal()" title="編輯篇章文字">✏️ 編輯</button>
        </section>

        <!-- Edit Passage Modal -->
        <div class="modal-overlay" id="edit-modal-overlay" style="display:none;" onclick="closeEditModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h2>✏️ 編輯篇章文字</h2>
                <p class="modal-subtitle" id="edit-modal-title"></p>
                <textarea id="edit-passage-textarea" rows="6"></textarea>
                <div class="modal-buttons">
                    <button class="btn-save" onclick="saveEdit()">💾 儲存</button>
                    <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                    <button class="btn-reset-default" onclick="resetToDefault()">🔄 還原預設</button>
                </div>
            </div>
        </div>

        <!-- Score Bar -->
        <div class="score-bar" id="score-bar" style="display:none;">
            <div class="score-item correct-count">
                <span class="score-label" id="green-label">🟢 優秀</span>
                <span class="score-value" id="correct-count">0</span>
            </div>
            <div class="score-item middle-count">
                <span class="score-label" id="yellow-label">🟡 尚可</span>
                <span class="score-value" id="middle-count">0</span>
            </div>
            <div class="score-item wrong-count">
                <span class="score-label" id="red-label">🔴 須改善</span>
                <span class="score-value" id="wrong-count">0</span>
            </div>
            <div class="score-item accuracy">
                <span class="score-label" id="avg-label">📊 總平均分</span>
                <span class="score-value" id="accuracy">0%</span>
            </div>
        </div>

        <!-- Passage Display -->
        <section class="passage-display" id="passage-display"></section>

        <!-- Phoneme detail panel -->
        <div class="phoneme-panel" id="phoneme-panel" style="display:none;">
            <h3>🔍 發音分析</h3>
            <div id="phoneme-detail"></div>
        </div>

        <!-- Controls -->
        <section class="controls">
            <button id="record-btn" class="btn-record" onclick="toggleRecording()">
                <span class="btn-icon">🎤</span>
                <span class="btn-text" id="record-text">開始錄音</span>
            </button>
            <button id="play-btn" class="btn-play" onclick="playTTS()" title="聽正確發音">
                <span class="btn-icon">🔊</span>
                <span class="btn-text">聽示範</span>
            </button>
            <button id="pause-btn" class="btn-pause" onclick="togglePauseTTS()" title="暫停/繼續" style="display:none;">
                <span class="btn-icon">⏯️</span>
                <span class="btn-text">暫停</span>
            </button>
            <button id="stop-tts-btn" class="btn-stop-tts" onclick="stopTTS()" title="停止播放" style="display:none;">
                <span class="btn-icon">⏹️</span>
                <span class="btn-text">停止</span>
            </button>
            <button id="reset-btn" class="btn-reset" onclick="resetAll()">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">重設</span>
            </button>
        </section>

        <!-- Mode Toggle -->
        <section class="mode-toggle">
            <span class="mode-label">辨識引擎：</span>
            <label class="toggle-switch">
                <input type="checkbox" id="mode-switch" onchange="toggleMode()" checked>
                <span class="toggle-slider"></span>
            </label>
            <span class="mode-name" id="mode-name">Azure AI</span>
        </section>

        <!-- Status -->
        <div class="status-bar" id="status-bar">
            <span class="status-dot"></span>
            <span class="status-text">準備就緒 — 按「開始錄音」練習</span>
        </div>
    </div>

    <script>
        const PASSAGES = {{ passages | tojson }};

        function getPinyin(text) {
            try {
                return pinyinPro.pinyin(text, { toneType: 'symbol', type: 'array' });
            } catch(e) {
                return text.split('').map(() => '');
            }
        }

        function isPunct(ch) {
            return /[，。！？、！？：；「」『』（）\s]/.test(ch);
        }

        let currentPassageId = 1;
        let isRecording = false;
        let recognitionMode = 'azure';  // 'web' or 'azure' (default: Azure)
        let finalTranscript = '';
        let charMatched = [];

        // ==================== MODE TOGGLE ====================
        function toggleMode() {
            if (isRecording) { isRecording = false; stopRecording(); }
            recognitionMode = document.getElementById('mode-switch').checked ? 'azure' : 'web';
            document.getElementById('mode-name').textContent = recognitionMode === 'azure' ? 'Azure AI' : 'Web Speech';
            document.getElementById('phoneme-panel').style.display = 'none';
            resetAll();
        }

        // ==================== WEB SPEECH API (Web mode) ====================
        let recognition = null;

        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('mode-switch').checked = true;
                toggleMode();
                updateStatus('warning', '⚠️ 瀏覽器不支援 Web Speech，已切換至 Azure 模式');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                updateStatus('recording', '🎤 Web Speech 收聽中...');
                document.getElementById('record-btn').classList.add('recording');
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch(e) {
                        setTimeout(() => { if(isRecording) recognition.start(); }, 200);
                    }
                } else {
                    finalizeWebResult();
                }
            };

            recognition.onresult = (event) => {
                let newInterim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        newInterim += event.results[i][0].transcript;
                    }
                }
                const displayText = (finalTranscript + newInterim).replace(/[^\u4e00-\u9fff\u3002\uff0c\uff1f\uff01]/g, '');
                compareTextWeb(finalTranscript + newInterim, false);
            };
        }

        function compareTextWeb(recognized, isFinal) {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            const expected = passage.text;
            const cleanRecText = recognized.replace(/[^\u4e00-\u9fff]/g, '');
            const expChars = [];
            for (let i = 0; i < expected.length; i++) {
                if (!isPunct(expected[i])) expChars.push(expected[i]);
            }
            if (charMatched.length !== expChars.length) {
                charMatched = new Array(expChars.length).fill(false);
            }
            let streamPtr = 0;
            for (let i = 0; i < expChars.length; i++) {
                const foundIdx = cleanRecText.indexOf(expChars[i], streamPtr);
                if (foundIdx !== -1) { charMatched[i] = true; streamPtr = foundIdx + 1; }
            }
            const correctCount = charMatched.filter(Boolean).length;
            updateScore(correctCount, isFinal ? expChars.length - correctCount : 0);
            renderPassageWeb(expected, getPinyin(expected), charMatched, isFinal);
        }

        function renderPassageWeb(text, pinyins, matchArray, isFinal) {
            const display = document.getElementById('passage-display');
            let html = '<div class="char-grid">';
            let charIdx = 0;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const py = i < pinyins.length ? pinyins[i] : '';
                if (isPunct(ch)) {
                    html += '<div class="char-cell punctuation"><span class="pinyin"></span><span class="char">' + ch + '</span></div>';
                } else {
                    const isCorrect = matchArray[charIdx];
                    const status = isCorrect ? 'correct' : (isFinal ? 'incorrect' : 'pending');
                    html += '<div class="char-cell ' + status + '" onclick="speakChar(\'' + ch + '\')">' +
                            '<span class="pinyin">' + (py === ch ? '' : py) + '</span><span class="char">' + ch + '</span></div>';
                    charIdx++;
                }
            }
            html += '</div>';
            display.innerHTML = html;
        }

        function finalizeWebResult() {
            document.getElementById('record-btn').classList.remove('recording');
            document.getElementById('record-text').textContent = '開始錄音';
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            compareTextWeb(finalTranscript, true);
            const total = cleanText(passage.text).length;
            const correct = charMatched.filter(Boolean).length;
            const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
            updateStatus('ready', '✅ 練習完成！準確度：' + acc + '% (' + correct + '/' + total + ')');
        }

        function cleanText(text) {
            return text.replace(/[，。！？、！？：；「」『』（）\s\.\,\!\?\:\;\-]/g, '');
        }

        // ==================== AUDIO RECORDING (Azure mode) ====================
        let audioContext = null;
        let mediaStream = null;
        let scriptNode = null;
        let audioChunks = [];
        let sampleRate = 16000;

        async function startRecording() {
            audioChunks = [];
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                // Use ACTUAL sample rate (browser may ignore the hint)
                sampleRate = audioContext.sampleRate;
                console.log('Recording at', sampleRate, 'Hz');
                const source = audioContext.createMediaStreamSource(mediaStream);
                // Downsample to 16kHz mono via ScriptProcessor
                scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
                scriptNode.onaudioprocess = (e) => {
                    if (!isRecording) return;
                    const input = e.inputBuffer.getChannelData(0);
                    // Convert float32 [-1,1] to int16 PCM
                    const pcm = new Int16Array(input.length);
                    for (let i = 0; i < input.length; i++) {
                        let s = Math.max(-1, Math.min(1, input[i]));
                        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    audioChunks.push(pcm);
                };
                source.connect(scriptNode);
                scriptNode.connect(audioContext.destination);
                updateStatus('recording', '🎤 錄音中...');
            } catch(e) {
                updateStatus('error', '❌ 無法使用咪高峰：' + e.message);
                isRecording = false;
            }
        }

        function stopRecording() {
            if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
        }

        function buildWavBlob(chunks, rate) {
            // Concatenate all PCM chunks
            let totalLen = 0;
            chunks.forEach(c => { totalLen += c.length; });
            const pcm = new Int16Array(totalLen);
            let offset = 0;
            chunks.forEach(c => { pcm.set(c, offset); offset += c.length; });

            // WAV header
            const dataLen = pcm.length * 2;
            const buf = new ArrayBuffer(44 + dataLen);
            const view = new DataView(buf);
            const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + dataLen, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);     // PCM
            view.setUint16(22, 1, true);     // mono
            view.setUint32(24, rate, true);
            view.setUint32(28, rate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, dataLen, true);
            // Write PCM data
            const pcm8 = new Uint8Array(buf, 44);
            const pcmView = new DataView(pcm.buffer);
            for (let i = 0; i < pcm.length; i++) {
                view.setInt16(44 + i * 2, pcm[i], true);
            }
            return new Blob([buf], { type: 'audio/wav' });
        }

        async function assessWithAzure() {
            if (audioChunks.length === 0) {
                updateStatus('warning', '⚠️ 冇錄到音，請再試');
                return;
            }
            updateStatus('assessing', '⏳ Azure AI 分析發音中...');
            const blob = buildWavBlob(audioChunks, sampleRate);
            const form = new FormData();
            form.append('audio', blob, 'recording.wav');
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            form.append('reference', passage.text);

            try {
                const res = await fetch('/pronunciation/assess', { method: 'POST', body: form });
                const data = await res.json();
                if (data.status === 'ok') {
                    finalTranscript = data.recognition || '';
                    renderResults(data);
                } else {
                    const msg = data.message || 'unknown';
                    updateStatus('error', '❌ Azure 錯誤：' + msg + '｜建議切換至 Web Speech 模式');
                }
            } catch(e) {
                updateStatus('error', '❌ 無法連接伺服器：' + e.message + '｜建議切換至 Web Speech 模式');
            }
        }

        function renderResults(data) {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            const expected = passage.text;
            const expectedChars = [];
            for (let i = 0; i < expected.length; i++) {
                if (!isPunct(expected[i])) expectedChars.push(expected[i]);
            }
            const expectedPinyins = getPinyin(expected);

            // Use DisplayText (ASR output) for character matching
            const recText = (data.recognition || '').replace(/[^\u4e00-\u9fff]/g, '');

            // Build score map from Azure Words (reference text words with scores)
            const words = data.words || [];
            const scoreMap = {}; // char → { accuracy, errorType, phonemes }
            let wi = 0;
            for (const w of words) {
                for (const ch of w.word) {
                    if (!isPunct(ch)) {
                        scoreMap[wi] = { accuracy: w.accuracy, errorType: w.error_type, phonemes: w.phonemes || [] };
                        wi++;
                    }
                }
            }

            // Greedy sequential match: recognized text vs expected chars
            charMatched = new Array(expectedChars.length).fill(false);
            const matchDetails = new Array(expectedChars.length).fill(null);
            let ri = 0;
            for (let ei = 0; ei < expectedChars.length; ei++) {
                const foundIdx = recText.indexOf(expectedChars[ei], ri);
                if (foundIdx !== -1) {
                    charMatched[ei] = true;
                    matchDetails[ei] = scoreMap[ei] || null; // map by expected char index
                    ri = foundIdx + 1;
                }
            }

            const correctCount = charMatched.filter(Boolean).length;
            // 3-tier breakdown for Azure
            let greenCount = 0, yellowCount = 0, redCount = 0, totalScore = 0, scoredWords = 0;
            for (let i = 0; i < expectedChars.length; i++) {
                if (!charMatched[i]) { redCount++; continue; }
                const detail = matchDetails[i];
                const acc = detail ? Math.round(detail.accuracy) : 0;
                totalScore += acc;
                scoredWords++;
                if (acc >= 85) greenCount++;
                else if (acc >= 50) yellowCount++;
                else redCount++;
            }
            const avgScore = scoredWords > 0 ? Math.round(totalScore / scoredWords) : 0;

            // Update score bar with 3-tier data
            document.getElementById('correct-count').textContent = greenCount;
            document.getElementById('green-label').textContent = '🟢 ≥85%';
            document.getElementById('middle-count').textContent = yellowCount;
            document.getElementById('yellow-label').textContent = '🟡 50-84%';
            document.getElementById('wrong-count').textContent = redCount;
            document.getElementById('red-label').textContent = '🔴 <50%';
            document.getElementById('accuracy').textContent = avgScore + '%';
            document.getElementById('avg-label').textContent = '📊 總平均分';
            document.getElementById('score-bar').style.display = 'flex';

            // Render chars with color + phoneme details as title tooltip
            renderPassageWithPhonemes(expected, expectedPinyins, charMatched, matchDetails);

            // Build phoneme panel
            buildPhonemePanel(expectedChars, expectedPinyins, charMatched, matchDetails, data);

            const acc = Math.round((correctCount / expectedChars.length) * 100);
            const emoji = acc >= 90 ? '🌟' : acc >= 70 ? '👍' : acc >= 50 ? '💪' : '📚';
            updateStatus('ready', emoji + ' 完成！準確度：' + acc + '%');
        }

        function renderPassageWithPhonemes(text, pinyins, matchArray, details) {
            const display = document.getElementById('passage-display');
            let html = '<div class="char-grid">';
            let charIdx = 0;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const py = i < pinyins.length ? pinyins[i] : '';
                if (isPunct(ch)) {
                    html += '<div class="char-cell punctuation"><span class="pinyin"></span><span class="char">' + ch + '</span></div>';
                } else {
                    const matched = matchArray[charIdx];
                    const detail = details[charIdx];
                    // 3-tier color by word accuracy score
                    let statusClass = 'incorrect';
                    let tooltip = ' data-tooltip="未讀到或讀錯"';
                    if (matched && detail) {
                        const acc = Math.round(detail.accuracy);
                        if (acc >= 85) statusClass = 'correct';
                        else if (acc >= 50) statusClass = 'correct-medium';
                        else statusClass = 'incorrect';
                        tooltip = ' data-tooltip="分數:' + acc + '%"';
                    } else if (matched) {
                        statusClass = 'correct';
                        tooltip = '';
                    }
                    html += '<div class="char-cell ' + statusClass + '" onclick="speakChar(\'' + ch + '\');showCharDetail(' + charIdx + ')" ' + tooltip + '>' +
                            '<span class="pinyin">' + (py === ch ? '' : py) + '</span>' +
                            '<span class="char">' + ch + '</span></div>';
                    charIdx++;
                }
            }
            html += '</div>';
            display.innerHTML = html;
        }

        function tierClass(score) {
            if (score === null || score === undefined) return '';
            if (score >= 85) return 'good';
            if (score >= 50) return 'medium';
            return 'bad';
        }
        let allDetails = null;
        let allChars = [];
        let allPinyins = [];
        let allMatched = [];

        function buildPhonemePanel(expectedChars, expectedPinyins, matched, details, data) {
            allChars = expectedChars;
            allPinyins = expectedPinyins;
            allMatched = matched;
            allDetails = details;
            document.getElementById('phoneme-panel').style.display = 'block';

            // Build per-word summary table
            let html = '<h4 style="margin:0 0 8px 0;">📊 逐字發音分析</h4>';
            html += '<div class="phoneme-summary-table">';
            html += '<div class="phoneme-row phoneme-header">' +
                '<span>字</span><span>拼音</span><span>分數</span><span>聲母</span><span>韻母</span><span>聲調</span>' +
                '</div>';

            for (let i = 0; i < expectedChars.length; i++) {
                const ch = expectedChars[i];
                const py = expectedPinyins[i] || '';
                const isMatched = matched[i];
                const detail = details[i];

                if (!isMatched) {
                    html += '<div class="phoneme-row">' +
                        '<span class="pw-char">' + ch + '</span>' +
                        '<span class="pw-py">' + py + '</span>' +
                        '<span class="pw-score bad">未讀</span>' +
                        '<span>—</span><span>—</span><span>—</span>' +
                        '</div>';
                    continue;
                }

                if (!detail) {
                    html += '<div class="phoneme-row">' +
                        '<span class="pw-char">' + ch + '</span>' +
                        '<span class="pw-py">' + py + '</span>' +
                        '<span class="pw-score">讀</span>' +
                        '<span>—</span><span>—</span><span>—</span>' +
                        '</div>';
                    continue;
                }

                // Parse Azure phoneme data
                const phonemes = detail.phonemes || [];
                let initAcc = null, finalAcc = null, toneNum = null, azurePinyin = '';
                if (phonemes.length > 0) {
                    const firstPh = phonemes[0].phoneme;
                    const parts = firstPh.split(' ');
                    azurePinyin = parts[0] || '';
                    toneNum = parseInt(parts[1]) || null;
                    initAcc = Math.round(phonemes[0].accuracy);
                    if (phonemes.length > 1) {
                        finalAcc = Math.round(phonemes.slice(1).reduce((s, p) => s + p.accuracy, 0) / (phonemes.length - 1));
                    } else {
                        finalAcc = initAcc;
                    }
                }
                const parsed = parsePinyin(py || azurePinyin);
                const expectedTone = parsed.tone;
                const toneMatch = (toneNum !== null && expectedTone !== null) ? (toneNum === expectedTone) : null;
                const wordAcc = Math.round(detail.accuracy);

                html += '<div class="phoneme-row" onclick="speakChar(\'' + ch + '\')">' +
                    '<span class="pw-char">' + ch + '</span>' +
                    '<span class="pw-py">' + (py || azurePinyin) + '</span>' +
                    '<span class="pw-score ' + tierClass(wordAcc) + '">' + wordAcc + '%</span>' +
                    '<span class="' + tierClass(initAcc) + '">' + (parsed.initial || '—') + ' ' + (initAcc !== null ? initAcc + '%' : '') + '</span>' +
                    '<span class="' + tierClass(finalAcc) + '">' + (parsed.final || '—') + ' ' + (finalAcc !== null ? finalAcc + '%' : '') + '</span>' +
                    '<span class="' + tierClass(initAcc) + '">' +
                        (toneNum !== null ? '第' + toneNum + '聲' : '—') +
                        (toneMatch === false ? ' ❌' : '') +
                    '</span>' +
                    '</div>';
            }
            html += '</div>';
            document.getElementById('phoneme-detail').innerHTML = html;
        }

        function showCharDetail(idx) {
            const panel = document.getElementById('phoneme-detail');
            const ch = allChars[idx];
            const py = allPinyins[idx] || '';
            const matched = allMatched[idx];
            const detail = allDetails[idx];

            if (!matched) {
                panel.innerHTML = '<div class="phoneme-char-box"><span class="phoneme-big-char">' + ch + '</span>' +
                    '<span class="phoneme-pinyin">' + py + '</span></div>' +
                    '<p style="color:#dc2626;margin-top:8px;">⚠️ 未讀到 —— 請再試一次</p>';
                return;
            }

            if (!detail) {
                panel.innerHTML = '<p>無詳細資料</p>';
                return;
            }

            // Parse pinyin into initial/final/tone
            // Azure phonemes are like "jiao 3" (pinyin + tone number)
            const phonemes = detail.phonemes || [];
            let initAcc = null, finalAcc = null, toneNum = null;
            let azurePinyin = '';

            if (phonemes.length > 0) {
                // First phoneme from Azure typically includes the full syllable
                const firstPh = phonemes[0].phoneme;
                // Parse "jiao 3" → initial="j", final="iao", tone=3
                const parts = firstPh.split(' ');
                azurePinyin = parts[0] || '';
                toneNum = parseInt(parts[1]) || null;
                initAcc = Math.round(phonemes[0].accuracy);

                // Other phonemes are finals/vowels
                if (phonemes.length > 1) {
                    finalAcc = Math.round(phonemes.slice(1).reduce((s, p) => s + p.accuracy, 0) / (phonemes.length - 1));
                } else {
                    finalAcc = initAcc; // Single phoneme covers both
                }
            }

            const parsed = parsePinyin(py || azurePinyin);
            const wordAcc = Math.round(detail.accuracy);

            let html = '<div class="phoneme-char-box">' +
                '<span class="phoneme-big-char">' + ch + '</span>' +
                '<span class="phoneme-pinyin">' + (py || azurePinyin || '') + '</span>' +
                '<span class="phoneme-score">分數：' + wordAcc + '%</span>' +
                '</div>';

            // 聲母 (Initial)
            html += '<div class="phoneme-section">' +
                '<span class="phoneme-label">聲母：</span>' +
                '<span class="phoneme-value ' + tierClass(initAcc) + '">' +
                (parsed.initial || '—') + '</span>' +
                (initAcc !== null ? '<span class="phoneme-pct ' + tierClass(initAcc) + '">' + initAcc + '%</span>' : '') +
                '</div>';

            // 韻母 (Final)
            html += '<div class="phoneme-section">' +
                '<span class="phoneme-label">韻母：</span>' +
                '<span class="phoneme-value ' + tierClass(finalAcc) + '">' +
                (parsed.final || '—') + '</span>' +
                (finalAcc !== null ? '<span class="phoneme-pct ' + tierClass(finalAcc) + '">' + finalAcc + '%</span>' : '') +
                '</div>';

            // 聲調 (Tone) - color by Azure score, not binary match
            const expectedTone = parsed.tone;
            const toneMatch = (toneNum !== null && expectedTone !== null) ? (toneNum === expectedTone) : null;
            html += '<div class="phoneme-section">' +
                '<span class="phoneme-label">聲調：</span>' +
                '<span class="phoneme-value ' + tierClass(initAcc) + '">' +
                (toneNum !== null ? '第' + toneNum + '聲' : (expectedTone ? '第' + expectedTone + '聲' : '—')) + '</span>' +
                (toneMatch === true ? ' ✅' : (toneMatch === false ? ' ❌ (應為第' + expectedTone + '聲)' : '')) +
                '</div>';

            // Raw Azure phonemes
            if (phonemes.length > 0) {
                html += '<div class="phoneme-raw">Azure phonemes: ';
                phonemes.forEach(p => {
                    html += '<span class="phoneme-tag ' + tierClass(p.accuracy) + '">' +
                        p.phoneme + ' ' + Math.round(p.accuracy) + '%</span> ';
                });
                html += '</div>';
            }

            panel.innerHTML = html;
        }

        function parsePinyin(py) {
            // Split pinyin into initial, final, tone
            if (!py) return { initial: '', final: '', tone: null };
            const toneMap = { 'ā':1,'á':2,'ǎ':3,'à':4,'ē':1,'é':2,'ě':3,'è':4,
                            'ī':1,'í':2,'ǐ':3,'ì':4,'ō':1,'ó':2,'ǒ':3,'ò':4,
                            'ū':1,'ú':2,'ǔ':3,'ù':4,'ǖ':1,'ǘ':2,'ǚ':3,'ǜ':4 };
            let tone = null;
            let stripped = '';
            for (const c of py) {
                if (toneMap[c]) { tone = toneMap[c]; stripped += c.normalize('NFD')[0]; }
                else stripped += c;
            }
            // Initials list
            const initials = ['zh','ch','sh','b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s','y','w'];
            let initial = '';
            let final = stripped;
            for (const ini of initials) {
                if (stripped.startsWith(ini)) {
                    initial = ini;
                    final = stripped.substring(ini.length);
                    break;
                }
            }
            return { initial, final, tone };
        }

        // (Passage change handled by inline onchange)
        // ==================== PASSAGE EDITING ====================
        function openEditModal() {
            const idx = currentPassageId - 1;
            document.getElementById('edit-modal-title').textContent = '主題：' + PASSAGES[idx].title;
            document.getElementById('edit-passage-textarea').value = PASSAGES[idx].text;
            document.getElementById('edit-modal-overlay').style.display = 'flex';
        }
        function closeEditModal() {
            document.getElementById('edit-modal-overlay').style.display = 'none';
        }
        async function saveEdit() {
            const idx = currentPassageId - 1;
            const newText = document.getElementById('edit-passage-textarea').value.trim();
            if (!newText) { alert('文字不能為空！'); return; }
            try {
                const res = await fetch('/pronunciation/save-passage', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentPassageId, title: PASSAGES[idx].title, text: newText })
                });
                const data = await res.json();
                if (data.status === 'ok') { PASSAGES[idx].text = newText; closeEditModal(); resetAll(); updateStatus('ready', '✅ 已儲存到伺服器！'); }
                else alert('儲存失敗：' + (data.message || '未知錯誤'));
            } catch(e) { alert('無法連接伺服器：' + e.message); }
        }
        async function resetToDefault() {
            const idx = currentPassageId - 1;
            if (!confirm('確定要還原「' + PASSAGES[idx].title + '」為預設文字？')) return;
            try {
                const res = await fetch('/pronunciation/reset-passage', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentPassageId })
                });
                const data = await res.json();
                if (data.status === 'ok') location.reload();
                else alert('還原失敗：' + (data.message || '未知錯誤'));
            } catch(e) { location.reload(); }
        }
        function onPassageChange() {
            currentPassageId = parseInt(document.getElementById('passage-select').value);
            resetAll();
        }

        // ==================== UI HELPERS ====================
        function updateScore(correct, wrong) {
            const total = correct + wrong;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('green-label').textContent = '🟢 正確';
            document.getElementById('middle-count').textContent = '—';
            document.getElementById('yellow-label').textContent = '🟡';
            document.getElementById('wrong-count').textContent = wrong;
            document.getElementById('red-label').textContent = '🔴 錯誤';
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('avg-label').textContent = '📊 準確度';
            document.getElementById('score-bar').style.display = 'flex';
        }
        function updateStatus(type, message) {
            const bar = document.getElementById('status-bar');
            bar.querySelector('.status-dot').className = 'status-dot ' + type;
            bar.querySelector('.status-text').textContent = message;
        }

        // ==================== RECORDING ====================
        async function toggleRecording() {
            if (!isRecording) {
                isRecording = true;
                finalTranscript = '';
                charMatched = [];
                document.getElementById('score-bar').style.display = 'none';
                document.getElementById('phoneme-panel').style.display = 'none';
                document.getElementById('phoneme-detail').innerHTML = '';
                const passage = PASSAGES.find(p => p.id === currentPassageId);
                renderPassageInitial(passage.text);
                document.getElementById('record-btn').classList.add('recording');
                document.getElementById('record-text').textContent = '停止錄音';

                if (recognitionMode === 'web') {
                    // Web Speech API mode
                    if (!recognition) setupRecognition();
                    if (recognition) recognition.start();
                    updateStatus('recording', '🎤 Web Speech 收聽中...');
                } else {
                    // Azure mode
                    await startRecording();
                }
            } else {
                isRecording = false;
                document.getElementById('record-btn').classList.remove('recording');
                document.getElementById('record-text').textContent = '開始錄音';

                if (recognitionMode === 'web') {
                    if (recognition) recognition.stop();
                } else {
                    stopRecording();
                    await assessWithAzure();
                }
            }
        }

        function renderPassageInitial(text) {
            const pinyins = getPinyin(text);
            const display = document.getElementById('passage-display');
            let html = '<div class="char-grid">';
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const py = i < pinyins.length ? pinyins[i] : '';
                if (isPunct(ch)) {
                    html += '<div class="char-cell punctuation"><span class="pinyin"></span><span class="char">' + ch + '</span></div>';
                } else {
                    html += '<div class="char-cell pending" onclick="speakChar(\'' + ch + '\')"><span class="pinyin">' + (py === ch ? '' : py) + '</span><span class="char">' + ch + '</span></div>';
                }
            }
            html += '</div>';
            display.innerHTML = html;
        }

        // ==================== TTS ====================
        let ttsPlaying = false, ttsPaused = false, ttsCharPos = 0;
        function updateTTSButtons(state) {
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const stopBtn = document.getElementById('stop-tts-btn');
            if (state === 'playing') {
                playBtn.style.display = 'none'; pauseBtn.style.display = 'inline-flex'; stopBtn.style.display = 'inline-flex';
                pauseBtn.querySelector('.btn-text').textContent = '暫停';
            } else if (state === 'paused') {
                pauseBtn.querySelector('.btn-text').textContent = '繼續';
            } else {
                playBtn.style.display = 'inline-flex'; pauseBtn.style.display = 'none'; stopBtn.style.display = 'none';
            }
        }
        function speakPassage(text, startPos) {
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text.substring(startPos));
                utterance.lang = 'zh-CN'; utterance.rate = 0.85;
                const voices = window.speechSynthesis.getVoices();
                const voice = voices.find(v => v.lang.includes('zh-CN')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.onboundary = (e) => { if (e.name === 'word') ttsCharPos = startPos + e.charIndex; };
                utterance.onstart = () => { ttsPlaying = true; ttsPaused = false; updateStatus('playing', '🔊 播放示範中...'); updateTTSButtons('playing'); };
                utterance.onend = () => { if (!ttsPaused) { ttsPlaying = false; ttsCharPos = 0; updateTTSButtons('stop'); updateStatus('ready', '示範完畢'); } };
                window.speechSynthesis.speak(utterance);
            }, 100);
        }
        function playTTS() {
            if (ttsPaused) { togglePauseTTS(); return; }
            ttsCharPos = 0;
            speakPassage(PASSAGES.find(p => p.id === currentPassageId).text, 0);
        }
        function togglePauseTTS() {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            if (ttsPlaying) {
                ttsPaused = true; ttsPlaying = false; window.speechSynthesis.cancel();
                updateStatus('playing', '⏸️ 已暫停'); updateTTSButtons('paused');
            } else if (ttsPaused) {
                speakPassage(passage.text, ttsCharPos);
            }
        }
        function stopTTS() {
            window.speechSynthesis.cancel(); ttsPlaying = false; ttsPaused = false; ttsCharPos = 0;
            updateTTSButtons('stop'); updateStatus('ready', '準備就緒 — 按「開始錄音」練習');
        }
        function speakChar(ch) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(ch); u.lang = 'zh-CN'; u.rate = 0.75;
            setTimeout(() => window.speechSynthesis.speak(u), 30);
        }

        function resetAll() {
            if (isRecording) {
                isRecording = false;
                if (recognitionMode === 'web' && recognition) recognition.stop();
                else stopRecording();
            }
            window.speechSynthesis.cancel(); ttsPlaying = false; ttsPaused = false; ttsCharPos = 0;
            updateTTSButtons('stop'); finalTranscript = ''; charMatched = [];
            document.getElementById('score-bar').style.display = 'none';
            document.getElementById('phoneme-panel').style.display = 'none';
            document.getElementById('record-btn').classList.remove('recording');
            document.getElementById('record-text').textContent = '開始錄音';
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            renderPassageInitial(passage.text);
            updateStatus('ready', '準備就緒');
        }

        // ==================== PHONEME PANEL CSS injection ====================
        const phonemeStyle = document.createElement('style');
        phonemeStyle.textContent = `
            .phoneme-panel { background:#f8fafc; border-radius:16px; padding:20px; margin-top:16px; border:2px solid #e2e8f0; }
            .phoneme-panel h3 { margin:0 0 8px 0; font-size:1.1rem; }
            .phoneme-hint { color:#94a3b8; font-size:0.9rem; }
            .phoneme-char-box { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
            .phoneme-big-char { font-size:2.5rem; font-weight:700; }
            .phoneme-pinyin { font-size:1.1rem; color:#64748b; }
            .phoneme-score { font-size:1.2rem; font-weight:700; color:#2563eb; margin-left:auto; }
            .phoneme-error-tag { background:#fee2e2; color:#dc2626; padding:2px 8px; border-radius:6px; font-size:0.85rem; }
            .phoneme-section { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:1rem; }
            .phoneme-label { color:#64748b; min-width:50px; }
            .phoneme-value { font-weight:700; font-size:1.1rem; }
            .phoneme-pct { margin-left:8px; font-weight:600; font-size:0.9rem; padding:2px 6px; border-radius:4px; }
            .good { color:#16a34a; background:#dcfce7; }
            .medium { color:#ca8a04; background:#fef9c3; }
            .bad { color:#dc2626; background:#fee2e2; }
            .phoneme-raw { margin-top:12px; padding-top:8px; border-top:1px solid #e2e8f0; font-size:0.85rem; color:#94a3b8; }
            .phoneme-tag { display:inline-block; padding:2px 6px; border-radius:4px; margin:2px; font-size:0.8rem; font-weight:600; }
            .char-cell { cursor:pointer; }
            .phoneme-summary-table { display:flex; flex-direction:column; gap:4px; max-height:400px; overflow-y:auto; }
            .phoneme-row { display:grid; grid-template-columns:40px 80px 55px 70px 80px 70px; align-items:center; gap:4px; padding:6px 8px; border-radius:8px; font-size:0.9rem; background:#fff; }
            .phoneme-row:hover { background:#f1f5f9; }
            .phoneme-header { font-weight:700; color:#64748b; font-size:0.8rem; background:#f8fafc !important; }
            .pw-char { font-weight:700; font-size:1.1rem; }
            .pw-py { color:#94a3b8; font-size:0.8rem; }
            .pw-score { font-weight:700; }
        `;
        document.head.appendChild(phonemeStyle);

        // Sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            const passage = PASSAGES.find(p => p.id === currentPassageId);
            renderPassageInitial(passage.text);
            window.speechSynthesis.getVoices();
        });
    </script>
</body>
