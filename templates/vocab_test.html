<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞彙測試</title>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-sidebar: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            --text-primary: #fff;
            --text-secondary: #b0b0b0;
            --accent: #667eea;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.3);
            --correct-bg: rgba(34, 197, 94, 0.3);
            --wrong-bg: rgba(239, 68, 68, 0.3);
        }
        
        body.light-mode {
            --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #d0d5dc 100%);
            --bg-sidebar: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --accent: #4a5fd6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
            --input-bg: #fff;
            --input-border: #ccc;
            --correct-bg: rgba(34, 197, 94, 0.2);
            --wrong-bg: rgba(239, 68, 68, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
        }

        .hamburger:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--text-primary);
            margin: 5px 0;
            border-radius: 2px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--bg-sidebar);
            padding-top: 80px;
            padding-left: 30px;
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a:hover {
            color: #667eea;
        }
        
        body.light-mode .sidebar a {
            color: var(--text-primary);
            border-bottom: 1px solid var(--card-border);
        }
        
        body.light-mode .sidebar a:hover {
            color: var(--accent);
        }
        
        /* Theme Switch */
        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .theme-switch:hover {
            background: var(--accent);
            color: #fff;
        }
        
        body.light-mode .hamburger {
            background: #ffffff;
            border: 1px solid #ddd;
        }
        
        body.light-mode .hamburger-icon {
            background: #1a1a2e;
        }
        
        body.light-mode .sidebar a {
            color: var(--text-primary);
            border-bottom: 1px solid var(--card-border);
        }
        
        body.light-mode .sidebar a:hover {
            color: var(--accent);
        }
        
        /* Theme Switch */
        .theme-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        
        .theme-switch:hover {
            background: var(--accent);
            color: #fff;
        }
        
        body.light-mode .theme-switch {
            background: #ffffff;
            color: #1a1a2e;
        }
        
        body.light-mode .overlay {
            background: rgba(0, 0, 0, 0.3);
        }
        
        body.light-mode .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }
        
        body.light-mode .input-section input,
        body.light-mode .input-section textarea {
            background-color: #ffffff !important;
            border: 1px solid #cccccc !important;
            color: #1a1a2e !important;
        }
        
        body.light-mode .input-section input::placeholder,
        body.light-mode .input-section textarea::placeholder {

        }
        
        body.light-mode .input-section label {

        }
        
        body.light-mode .btn-primary {
            background: var(--accent);

        }
        
        body.light-mode .options button {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }

        body.light-mode .btn {
            color: #fff;
        }
        
        body.light-mode .spinner {
            border-color: rgba(0, 0, 0, 0.1);

        }

        }

        body.light-mode .question-text {

        }

            border: 2px solid rgba(0, 0, 0, 0.15);
            color: #1a1a2e;
        }
        
        body.light-mode .option:hover {

            background: rgba(102, 126, 234, 0.15);
        }
        
        body.light-mode .option.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.4);
            color: #1a1a2e;
        }
        
        body.light-mode .option.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.4);
            color: #1a1a2e;
        }
        
        .overlay {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding-top: 60px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #667eea;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;

        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        /* Quiz Section */
        .quiz-section {
            display: none;
        }

        .quiz-section.show {
            display: block;
        }

        .progress {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
            color: #a0a0a0;
        }

        .batch-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #667eea;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-vocab {
            font-size: 1.8rem;
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.8;
            text-align: center;
            font-family: 'Noto Serif TC', serif;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.3);
        }

        .option.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.3);
        }

        .option.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.3);
        }

        .option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-nav {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
        }
        
        body.light-mode .btn-nav {
            background: rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }
        
        body.light-mode .btn-nav:hover {
            background: rgba(0, 0, 0, 0.2);
        }
        
        body.light-mode .btn-nav:disabled {
            opacity: 0.5;
            color: #888;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Results */
        .results {

        }

        .results.show {

        .score {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .score-text {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .btn-restart {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-next-batch {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-next-batch:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
        }

        .all-complete {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;

            font-size: 1.1rem;
        }
        
        body.light-mode .score-text {
            color: #555;
        }
        
        body.light-mode .all-complete {
            background: rgba(34, 197, 94, 0.15);

        }
        
        body.light-mode .all-complete span,
        body.light-mode #batchActions {

        @media (max-width: 600px) {

                padding: 20px 10px;

            h1 {

    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="theme-switch" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Dark Mode</span>
        </div>
        <a href="/"><span>🏠</span> Home</a>
        <a href="/news-clipper"><span>📰</span> News Clipper</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
        <a href="https://gemini.google.com/share/b200771ce08e" target="_blank"><span>🧩</span> 中文詞彙測試 (Gemini)</a>
        <a href="https://gemini.google.com/share/97151a39e237" target="_blank"><span>🎭</span> Slide Translator (Gemini)</a>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <h1>📝 中文詞彙測試</h1>

        <!-- Input Section -->
        <div class="card input-section" id="inputSection">
            <div class="input-section">
                <label for="vocabInput">請輸入中文詞彙（用空格分隔）：</label>
                <textarea id="vocabInput" placeholder="例如：經歷 糾結 挫敗 借鑒 逃避 悲憤 煩惱 正視 化解 難免"></textarea>
            </div>
            <button class="btn" id="startBtn" onclick="startQuiz(); return false;">開始測試</button>
            <div style="text-align:center; margin-top:15px; color:#666; font-size:0.85rem;">{{ version }}</div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在生成題目（請稍候，最多需時約2分鐘）...</p>
            <div id="debugMsg" style="color: #667eea; margin-top: 15px; font-size: 0.9rem;"></div>
        </div>

        <!-- Error -->
        <div class="error" id="error"></div>

        <!-- Quiz Section -->
        <div class="quiz-section" id="quizSection">
            <div class="batch-info" id="batchInfo"></div>
            <div class="progress" id="progress"></div>
            <div class="question-card" id="questionCard"></div>
            <div class="nav-buttons">
                <button class="btn-nav" id="prevBtn" onclick="prevQuestion()" disabled>上一題</button>
                <button class="btn-nav" id="nextBtn" onclick="nextQuestion()">下一題</button>
                <button class="btn-nav" id="submitBtn" onclick="showBatchResults()" style="display: none;">完成這批</button>
            </div>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <div class="card">
                <div class="score" id="score">0</div>
                <div class="score-text" id="scoreText"></div>
                <div id="batchActions"></div>
                <div style="text-align:center; margin-top:20px; color:#666; font-size:0.85rem;">{{ version }}</div>
            </div>
        </div>
    </div>

    <script>
        const BATCH_SIZE = 4;  // 4 questions per batch
        
        let allWords = [];  // All vocabulary words from user input
        let currentBatchIndex = 0;  // Current batch number (0-indexed)
        let currentBatchVocab = [];  // Vocabularies for current batch
        let quizData = [];  // {word, sentence} from API for current batch
        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];
        let totalScore = 0;  // Accumulated score across all batches
        let batchesCompleted = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateOptions(correctWord, allWords) {
            const uniqueWords = [...new Set(allWords)];
            const distractors = uniqueWords.filter(w => w !== correctWord);
            // 要4個選項，所以需要3個干擾詞。如果不夠，用現有的重複。
            let selectedDistractors = shuffleArray(distractors).slice(0, 3);
            
            // 如果干擾詞不夠3個，重複補足
            while (selectedDistractors.length < 3) {
                selectedDistractors.push(...shuffleArray(distractors).slice(0, 1));
                selectedDistractors = [...new Set(selectedDistractors)]; // 去重
            }
            
            const options = shuffleArray([correctWord, ...selectedDistractors]);
            return options;
        }

        async function startQuiz() {
            const vocabInput = document.getElementById('vocabInput').value.trim();
            
            if (!vocabInput) {
                showError('請輸入中文詞彙');
                return;
            }

            // Parse and shuffle all vocabulary
            allWords = shuffleArray(vocabInput.split(/[\n\s]+/).filter(w => w.trim()));
            
            if (allWords.length < 2) {
                showError('請輸入至少2個中文詞彙');
                return;
            }

            // Reset state
            totalScore = 0;
            batchesCompleted = 0;
            currentBatchIndex = 0;

            hideError();
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '🔥 正在生成題目...';
            
            // Start first batch
            await loadNextBatch();
        }

        async function loadNextBatch() {
            const debugEl = document.getElementById('debugMsg');
            
            if (debugEl) {
                debugEl.textContent = 'Step 0: loadNextBatch() 入口';
                debugEl.style.color = 'yellow';
            }
            
            // 強制顯示 loading 動畫
            showLoading();
            
            // Calculate batch range
            const startIdx = currentBatchIndex * BATCH_SIZE;
            const endIdx = Math.min(startIdx + BATCH_SIZE, allWords.length);
            currentBatchVocab = allWords.slice(startIdx, endIdx);
            
            const batchNum = currentBatchIndex + 1;
            const totalBatches = Math.ceil(allWords.length / BATCH_SIZE);
            
            document.getElementById('batchInfo').textContent = 
                `第 ${batchNum} 批，共 ${totalBatches} 批（${startIdx + 1}-${endIdx} 詞）`;

            if (debugEl) debugEl.textContent = 'Step 2: Calling API...';

            // Create abort controller and timeout OUTSIDE try block
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 180000); // 180s client timeout
            
            try {
                if (debugEl) debugEl.textContent = 'Step 2: Fetch started...';
                
                const response = await fetch('/api/generate-quiz', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ vocabularies: currentBatchVocab.join(' ') }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);

                if (debugEl) debugEl.textContent = 'Step 3: API returned, status: ' + response.status + ', statusText: ' + response.statusText;

                if (!response.ok) {
                    const errMsg = '伺服器錯誤: ' + response.status + ' ' + response.statusText;
                    showError(errMsg);
                    hideLoading();
                    document.getElementById('startBtn').disabled = false;
                    return;
                }

                let data;
                try {
                    const text = await response.text();
                    if (debugEl) debugEl.textContent = `Step 3.5: Received ${text.length} chars. First 100: ${text.substring(0, 100)}`;

                    if (!text || text.trim() === '') {
                        throw new Error('Empty response from server');
                    }

                    data = JSON.parse(text);
                } catch (jsonErr) {
                    console.error('JSON parse failed:', jsonErr);
                    if (debugEl) debugEl.textContent = 'JSON parse error: ' + jsonErr.message;
                    data = { success: false, error: '伺服器返回無效格式（可能是超時或錯誤頁面）' };
                }
                if (debugEl) debugEl.textContent = 'Step 4: data.success=' + data.success + ', data.error=' + data.error;

                if (data.success) {
                    quizData = shuffleArray(data.data);  // Shuffle questions for random order
                    userAnswers = new Array(quizData.length).fill(null);
                    currentIndex = 0;
                    score = 0;
                    
                    // 強制隱藏 loading
                    const loadingEl = document.getElementById('loading');
                    if (loadingEl) loadingEl.style.display = 'none';
                    if (loadingEl) loadingEl.classList.remove('show');
                    
                    // 確保 inputSection 係 hidden
                    const inputSection = document.getElementById('inputSection');
                    if (inputSection) inputSection.style.display = 'none';
                    
                    // 強制顯示 quizSection
                    const quizSection = document.getElementById('quizSection');
                    if (quizSection) {
                        quizSection.style.display = 'block';
                        quizSection.classList.add('show');
                    }
                    
                    displayQuestion();
                } else {
                    // Show error
                    const errMsg = data.error || '生成題目時發生錯誤，請稍後再試';
                    if (debugEl) debugEl.textContent = 'API ERROR: ' + errMsg;
                    showError(errMsg);
                    hideLoading();
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (error) {
                clearTimeout(timeoutId);

                let errMsg = '網絡錯誤，請稍後再試';

                if (error.name === 'AbortError') {
                    errMsg = '請求超時（伺服器處理時間太長，可能需要2-3分鐘）';
                } else if (error.message.includes('JSON') || error.message.includes('Unexpected token')) {
                    errMsg = '後端返回異常（很可能 Worker Timeout），請減少詞彙數量或稍後再試';
                } else if (error.message.includes('Failed to fetch')) {
                    errMsg = '無法連接到伺服器';
                } else {
                    errMsg = error.message || errMsg;
                }

                if (debugEl) {
                    debugEl.textContent = 'CATCH ERROR: ' + errMsg;
                    debugEl.style.color = 'red';
                }

                showError(errMsg);
                hideLoading();
                document.getElementById('startBtn').disabled = false;

                // 強制還原輸入區塊（防止空白畫面）
                const inputSection = document.getElementById('inputSection');
                if (inputSection) inputSection.style.display = 'block';
            }
        }

        function showLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'block';
                loading.classList.add('show');
            }
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('quizSection').classList.remove('show');
            document.getElementById('results').style.display = 'none';
            document.getElementById('results').classList.remove('show');
        }

        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.classList.remove('show');
            // 還原輸入區塊，防止空白畫面
            const inputSection = document.getElementById('inputSection');
            if (inputSection) {
                inputSection.style.display = 'block';
                inputSection.style.border = '2px solid rgba(255, 255, 255, 0.1)';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showQuiz() {
            const quizSection = document.getElementById('quizSection');
            quizSection.style.display = 'block';
            quizSection.classList.add('show');
            document.getElementById('results').classList.remove('show');
        }

        function displayQuestion() {
            const item = quizData[currentIndex];
            const progress = document.getElementById('progress');
            const questionCard = document.getElementById('questionCard');
            
            progress.textContent = `第 ${currentIndex + 1} 題，共 ${quizData.length} 題`;
            
            // Format sentence
            const formattedSentence = item.sentence.replace('____', '_____');
            
            // Generate options using ALL vocabulary (not just current batch) for 4 choices
            const options = generateOptions(item.word, allWords);
            userAnswers[currentIndex] = { options: options, selected: null };
            
            const optionsHtml = options.map((option, idx) => `
                <div class="option" data-index="${idx}" onclick="selectOption(${idx})">
                    ${option}
                </div>
            `).join('');

            questionCard.innerHTML = `
                <div class="question-text">${formattedSentence}</div>
                <div class="options">${optionsHtml}</div>
            `;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            
            if (currentIndex < quizData.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            } else {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            }
        }

        function selectOption(idx) {
            const answerData = userAnswers[currentIndex];
            if (answerData.selected !== null) return;

            const options = answerData.options;
            const selectedWord = options[idx];
            const correctWord = quizData[currentIndex].word;
            const isCorrect = selectedWord === correctWord;
            
            if (isCorrect) {
                score += 10;
            }
            
            answerData.selected = idx;
            answerData.correct = isCorrect;
            
            const optionElements = document.querySelectorAll('.option');
            optionElements.forEach((el, i) => {
                el.classList.add('disabled');
                if (options[i] === correctWord) {
                    el.classList.add('correct');
                } else if (i === idx && !isCorrect) {
                    el.classList.add('wrong');
                }
            });
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                displayQuestion();
            }
        }

        function showBatchResults() {
            totalScore += score;
            batchesCompleted++;
            
            // 重要：完成這批後增加 currentBatchIndex
            currentBatchIndex++;
            
            const totalBatches = Math.ceil(allWords.length / BATCH_SIZE);
            const hasMoreBatches = currentBatchIndex < totalBatches;
            
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('quizSection').classList.remove('show');
            
            const resultsEl = document.getElementById('results');
            resultsEl.style.display = 'block';
            resultsEl.classList.add('show');
            
            document.getElementById('score').textContent = score;
            
            const percentage = Math.round((score / (quizData.length * 10)) * 100);
            document.getElementById('scoreText').innerHTML = 
                `這一批：${score} / ${quizData.length * 10} | 正確率：${percentage}%<br>` +
                `<span style="color:inherit; font-size:1.2rem;">📊 累積總分：${totalScore} 分（${batchesCompleted} 批已完成）</span>`;
            
            // Build batch actions
            let batchActionsHtml = '';
            if (hasMoreBatches) {
                const nextBatchNum = currentBatchIndex + 1;
                batchActionsHtml = `
                    <button class="btn-next-batch" id="nextBatchBtn" onclick="loadNextBatch(); return false;">下一批題目 (${nextBatchNum}/${totalBatches})</button>
                    <button class="btn-restart" onclick="restartQuiz(); return false;">重新開始</button>
                `;
            } else {
                const totalPossible = allWords.length * 10;
                const totalPercentage = Math.round((totalScore / totalPossible) * 100);
                batchActionsHtml = `
                    <div class="all-complete">
                        🎉 恭喜完成所有詞彙！<br><br>
                        📊 累積總分：${totalScore} / ${totalPossible} 分（${totalPercentage}%正確）
                    </div>
                    <button class="btn-restart" onclick="restartQuiz()" style="margin-top: 20px;">重新開始</button>
                `;
            }
            
            document.getElementById('batchActions').innerHTML = batchActionsHtml;
        }

        function restartQuiz() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('results').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('inputSection').style.border = '2px solid rgba(255, 255, 255, 0.1)';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '開始測試';
            document.getElementById('vocabInput').value = '';
            document.getElementById('error').classList.remove('show');
            document.getElementById('error').style.display = 'none';
            
            // 清除 scoreText 同 score display
            document.getElementById('score').textContent = '0';
            document.getElementById('scoreText').textContent = '';
            document.getElementById('batchActions').innerHTML = '';
            
            // Reset all state
            allWords = [];
            currentBatchIndex = 0;
            currentBatchVocab = [];
            quizData = [];
            currentIndex = 0;
            score = 0;
            userAnswers = [];
            totalScore = 0;
            batchesCompleted = 0;
        }
        
        // Global error handler for uncaught errors
        window.onerror = function(msg, url, line, col, error) {
            const debugEl = document.getElementById('debugMsg');
            if (debugEl) {
                debugEl.textContent = 'GLOBAL ERROR: ' + msg + ' (line:' + line + ')';
                debugEl.style.color = 'red';
            }
            return true; // Prevent default error handling
        };
        
        // Promise rejection handler
        window.onunhandledrejection = function(event) {
            const debugEl = document.getElementById('debugMsg');
            if (debugEl) {
                debugEl.textContent = 'UNHANDLED REJECTION: ' + event.reason;
                debugEl.style.color = 'red';
            }
        };
        
        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('theme-text').textContent = isLight ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        
        // Load saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-icon').textContent = '☀️';
            document.getElementById('theme-text').textContent = 'Light Mode';
        }
    </script>
</body>
</html>
