<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞彙測試</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .hamburger:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: #fff;
            margin: 5px 0;
            border-radius: 2px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 80px;
            padding-left: 30px;
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a:hover {
            color: #667eea;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding-top: 60px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #667eea;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        /* Quiz Section */
        .quiz-section {
            display: none;
        }

        .quiz-section.show {
            display: block;
        }

        .progress {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
            color: #a0a0a0;
        }

        .batch-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #667eea;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-vocab {
            font-size: 1.8rem;
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.8;
            text-align: center;
            font-family: 'Noto Serif TC', serif;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.3);
        }

        .option.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.3);
        }

        .option.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.3);
        }

        .option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-nav {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results */
        .results {
            text-align: center;
            display: none;
        }

        .results.show {
            display: block;
        }

        .score {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .score-text {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .btn-restart {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-next-batch {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-next-batch:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
        }

        .all-complete {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            color: #86efac;
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 10px;
                padding-top: 70px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .question-vocab {
                font-size: 1.5rem;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleSidebar()">
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
        <span class="hamburger-icon"></span>
    </div>

    <nav class="sidebar" id="sidebar">
        <a href="/"><span>🏠</span> Home</a>
        <a href="/vocab-test"><span>📝</span> 中文詞彙測試</a>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="container">
        <h1>📝 中文詞彙測試</h1>

        <!-- Input Section -->
        <div class="card input-section" id="inputSection">
            <div class="input-section">
                <label for="vocabInput">請輸入中文詞彙（用空格分隔）：</label>
                <textarea id="vocabInput" placeholder="例如：經歷 糾結 挫敗 借鑒 逃避 悲憤 煩惱 正視 化解 難免"></textarea>
            </div>
            <button class="btn" id="startBtn" onclick="startQuiz(); return false;">開始測試</button>
            <div style="text-align:center; margin-top:15px; color:#666; font-size:0.85rem;">{{ version }}</div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在生成題目（請稍候，最多需時約2分鐘）...</p>
            <div id="debugMsg" style="color: #667eea; margin-top: 15px; font-size: 0.9rem;"></div>
        </div>

        <!-- Error -->
        <div class="error" id="error"></div>

        <!-- Quiz Section -->
        <div class="quiz-section" id="quizSection">
            <div class="batch-info" id="batchInfo"></div>
            <div class="progress" id="progress"></div>
            <div class="question-card" id="questionCard"></div>
            <div class="nav-buttons">
                <button class="btn-nav" id="prevBtn" onclick="prevQuestion()" disabled>上一題</button>
                <button class="btn-nav" id="nextBtn" onclick="nextQuestion()">下一題</button>
                <button class="btn-nav" id="submitBtn" onclick="showBatchResults()" style="display: none;">完成這批</button>
            </div>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <div class="card">
                <div class="score" id="score">0</div>
                <div class="score-text" id="scoreText"></div>
                <div id="batchActions"></div>
                <div style="text-align:center; margin-top:20px; color:#666; font-size:0.85rem;">{{ version }}</div>
            </div>
        </div>
    </div>

    <script>
        const BATCH_SIZE = 3;  // Reduced for faster generation
        
        let allWords = [];  // All vocabulary words from user input
        let currentBatchIndex = 0;  // Current batch number (0-indexed)
        let currentBatchVocab = [];  // Vocabularies for current batch
        let quizData = [];  // {word, sentence} from API for current batch
        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];
        let totalScore = 0;  // Accumulated score across all batches
        let batchesCompleted = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateOptions(correctWord, allWords) {
            const uniqueWords = [...new Set(allWords)];
            const distractors = uniqueWords.filter(w => w !== correctWord);
            const selectedDistractors = shuffleArray(distractors).slice(0, 3);
            const options = shuffleArray([correctWord, ...selectedDistractors]);
            return options;
        }

        async function startQuiz() {
            // 清理之前測試殘留
            const oldBlocker = document.getElementById('blockerMsg');
            if (oldBlocker) oldBlocker.remove();
            const oldTestMsg = document.getElementById('testMsg');
            if (oldTestMsg) oldTestMsg.remove();
            
            // 測試用：立即顯示 alert 確認 JS 運行
            alert('JS 正常運行！');
            
            const vocabInput = document.getElementById('vocabInput').value.trim();
            
            if (!vocabInput) {
                showError('請輸入中文詞彙');
                return;
            }

            // Parse and shuffle all vocabulary
            allWords = shuffleArray(vocabInput.split(/[\n\s]+/).filter(w => w.trim()));
            
            if (allWords.length < 2) {
                showError('請輸入至少2個中文詞彙');
                return;
            }

            // Reset state
            totalScore = 0;
            batchesCompleted = 0;
            currentBatchIndex = 0;

            hideError();
            
            // 立即喺輸入框上方顯示測試文字
            const inputSection = document.getElementById('inputSection');
            if (inputSection) {
                inputSection.style.border = '5px solid red';
                inputSection.insertAdjacentHTML('beforebegin', '<div id="testMsg" style="color:red; font-size:2rem; text-align:center; padding:20px;">🔥 startQuiz() 成功執行！border 變紅色係為咗測試</div>');
            }
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '🔥 正在生成題目...';
            
            // Start first batch
            await loadNextBatch();
        }

        async function loadNextBatch() {
            // 測試用：喺 showLoading 之前就顯示訊息
            const debugEl = document.getElementById('debugMsg');
            const inputSection = document.getElementById('inputSection');
            
            // 用 document.body 插入绝对不会被 hideLoading() 移除的訊息
            document.body.insertAdjacentHTML('afterbegin', 
                '<div id="blockerMsg" style="position:fixed; top:0; left:0; right:0; z-index:9999; background:red; color:white; font-size:2rem; padding:20px; text-align:center;">🚨 loadNextBatch() 正在執行，請稍候...</div>');
            
            if (debugEl) {
                debugEl.textContent = 'Step 0: loadNextBatch() 入口';
                debugEl.style.color = 'yellow';
            }
            
            showLoading();
            
            // Calculate batch range
            const startIdx = currentBatchIndex * BATCH_SIZE;
            const endIdx = Math.min(startIdx + BATCH_SIZE, allWords.length);
            currentBatchVocab = allWords.slice(startIdx, endIdx);
            
            const batchNum = currentBatchIndex + 1;
            const totalBatches = Math.ceil(allWords.length / BATCH_SIZE);
            
            document.getElementById('batchInfo').textContent = 
                `第 ${batchNum} 批，共 ${totalBatches} 批（${startIdx + 1}-${endIdx} 詞）`;

            if (debugEl) debugEl.textContent = 'Step 2: Calling API...';

            // 更新 blocker 顯示即將發送 API 請求
            const blockerMsg = document.getElementById('blockerMsg');
            if (blockerMsg) {
                blockerMsg.textContent = '📡 準備發送 API 請求到 /api/generate-quiz...';
                blockerMsg.style.background = 'purple';
            }
            if (debugEl) debugEl.textContent = 'Step 1.5: About to fetch...';

            // Create abort controller and timeout OUTSIDE try block
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 45000); // 45s client timeout
            
            try {
                if (debugEl) debugEl.textContent = 'Step 2: Fetch started...';
                
                // 更新 blocker 顯示正在等待
                if (blockerMsg) {
                    blockerMsg.textContent = '⏳ 等待 API 回應中...（最多45秒）';
                    blockerMsg.style.background = 'orange';
                }
                
                const response = await fetch('/api/generate-quiz', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ vocabularies: currentBatchVocab.join(' ') }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                if (blockerMsg) {
                    blockerMsg.textContent = '📩 API 回應了！status:' + response.status + ' - 處理中...';
                    blockerMsg.style.background = 'green';
                }

                if (debugEl) debugEl.textContent = 'Step 3: API returned, status: ' + response.status + ', statusText: ' + response.statusText;

                if (!response.ok) {
                    const errMsg = '伺服器錯誤: ' + response.status + ' ' + response.statusText;
                    if (blockerMsg) {
                        blockerMsg.textContent = '❌ ' + errMsg;
                        blockerMsg.style.background = 'darkred';
                    }
                    showError(errMsg);
                    hideLoading();
                    document.getElementById('startBtn').disabled = false;
                    return;
                }

                let data;
                try {
                    const text = await response.text();
                    if (blockerMsg) {
                        blockerMsg.textContent = '📩 API 回應了！status:' + response.status + ' text長度:' + text.length + ' - 解析中...';
                    }
                    if (debugEl) debugEl.textContent = `Step 3.5: Received ${text.length} chars. First 100: ${text.substring(0, 100)}`;

                    if (!text || text.trim() === '') {
                        throw new Error('Empty response from server');
                    }

                    data = JSON.parse(text);
                } catch (jsonErr) {
                    console.error('JSON parse failed:', jsonErr);
                    if (blockerMsg) {
                        blockerMsg.textContent = '❌ JSON 解析失敗: ' + jsonErr.message;
                        blockerMsg.style.background = 'darkred';
                    }
                    if (debugEl) debugEl.textContent = 'JSON parse error: ' + jsonErr.message;
                    data = { success: false, error: '伺服器返回無效格式（可能是超時或錯誤頁面）' };
                }
                if (debugEl) debugEl.textContent = 'Step 4: data.success=' + data.success + ', data.error=' + data.error;

                if (data.success) {
                    // 成功！顯示藍色確認
                    if (blockerMsg) {
                        blockerMsg.textContent = '🎉 API 成功！正在顯示題目... data.data.length=' + data.data.length;
                        blockerMsg.style.background = 'blue';
                    }
                    quizData = shuffleArray(data.data);  // Shuffle questions for random order
                    userAnswers = new Array(quizData.length).fill(null);
                    currentIndex = 0;
                    score = 0;
                    
                    // 強制隱藏 loading
                    const loadingEl = document.getElementById('loading');
                    if (loadingEl) loadingEl.style.display = 'none';
                    if (loadingEl) loadingEl.classList.remove('show');
                    
                    // 確保 inputSection 係 hidden
                    const inputSection = document.getElementById('inputSection');
                    if (inputSection) inputSection.style.display = 'none';
                    
                    // 強制顯示 quizSection
                    const quizSection = document.getElementById('quizSection');
                    if (quizSection) {
                        quizSection.style.display = 'block';
                        quizSection.classList.add('show');
                        if (blockerMsg) {
                            blockerMsg.textContent = '✅ 完成！quizSection display=' + quizSection.style.display;
                        }
                    }
                    
                    displayQuestion();
                    
                    // 3秒後移除 blocker
                    if (blockerMsg) {
                        setTimeout(() => {
                            if (blockerMsg) blockerMsg.remove();
                            const testMsg = document.getElementById('testMsg');
                            if (testMsg) testMsg.remove();
                        }, 3000);
                    }
                } else {
                    // Show error but keep blocker visible
                    const errMsg = data.error || '生成題目時發生錯誤，請稍後再試';
                    if (blockerMsg) {
                        blockerMsg.textContent = '❌ ' + errMsg;
                        blockerMsg.style.background = 'darkred';
                    }
                    if (debugEl) debugEl.textContent = 'API ERROR: ' + errMsg;
                    showError(errMsg);
                    hideLoading();
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (error) {
                clearTimeout(timeoutId);

                let errMsg = '網絡錯誤，請稍後再試';

                if (error.name === 'AbortError') {
                    errMsg = '生成時間過長（建議每批最多 3–4 個詞彙）';
                } else if (error.message.includes('JSON') || error.message.includes('Unexpected token')) {
                    errMsg = '後端返回異常（很可能 Worker Timeout），請減少詞彙數量或稍後再試';
                } else if (error.message.includes('Failed to fetch')) {
                    errMsg = '無法連接到伺服器';
                } else {
                    errMsg = error.message || errMsg;
                }

                if (blockerMsg) {
                    blockerMsg.textContent = '❌ CATCH: ' + errMsg;
                    blockerMsg.style.background = 'darkred';
                }
                if (debugEl) {
                    debugEl.textContent = 'CATCH ERROR: ' + errMsg;
                    debugEl.style.color = 'red';
                }

                showError(errMsg);
                hideLoading();
                document.getElementById('startBtn').disabled = false;

                // 強制還原輸入區塊（防止空白畫面）
                const inputSection = document.getElementById('inputSection');
                if (inputSection) inputSection.style.display = 'block';
            }
        }

        function showLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.classList.add('show');
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('results').style.display = 'none';
        }

        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.classList.remove('show');
            // 重要：還原輸入區塊，防止空白畫面
            const inputSection = document.getElementById('inputSection');
            if (inputSection) inputSection.style.display = 'block';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showQuiz() {
            const quizSection = document.getElementById('quizSection');
            quizSection.style.display = 'block';
            quizSection.classList.add('show');
            document.getElementById('results').classList.remove('show');
        }

        function displayQuestion() {
            const item = quizData[currentIndex];
            const progress = document.getElementById('progress');
            const questionCard = document.getElementById('questionCard');
            
            progress.textContent = `第 ${currentIndex + 1} 題，共 ${quizData.length} 題`;
            
            // Format sentence
            const formattedSentence = item.sentence.replace('____', '_____');
            
            // Generate options using current batch vocabulary
            const options = generateOptions(item.word, currentBatchVocab);
            userAnswers[currentIndex] = { options: options, selected: null };
            
            const optionsHtml = options.map((option, idx) => `
                <div class="option" data-index="${idx}" onclick="selectOption(${idx})">
                    ${option}
                </div>
            `).join('');

            questionCard.innerHTML = `
                <div class="question-text">${formattedSentence}</div>
                <div class="options">${optionsHtml}</div>
            `;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            
            if (currentIndex < quizData.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            } else {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            }
        }

        function selectOption(idx) {
            const answerData = userAnswers[currentIndex];
            if (answerData.selected !== null) return;

            const options = answerData.options;
            const selectedWord = options[idx];
            const correctWord = quizData[currentIndex].word;
            const isCorrect = selectedWord === correctWord;
            
            if (isCorrect) {
                score += 10;
            }
            
            answerData.selected = idx;
            answerData.correct = isCorrect;
            
            const optionElements = document.querySelectorAll('.option');
            optionElements.forEach((el, i) => {
                el.classList.add('disabled');
                if (options[i] === correctWord) {
                    el.classList.add('correct');
                } else if (i === idx && !isCorrect) {
                    el.classList.add('wrong');
                }
            });
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                displayQuestion();
            }
        }

        function showBatchResults() {
            totalScore += score;
            batchesCompleted++;
            
            const totalBatches = Math.ceil(allWords.length / BATCH_SIZE);
            const hasMoreBatches = (currentBatchIndex + 1) < totalBatches;
            
            document.getElementById('quizSection').classList.remove('show');
            document.getElementById('results').classList.add('show');
            document.getElementById('score').textContent = score;
            
            const percentage = Math.round((score / (quizData.length * 10)) * 100);
            document.getElementById('scoreText').textContent = 
                `這一批：${score} / ${quizData.length * 10} | 正確率：${percentage}%`;
            
            // Build batch actions
            let batchActionsHtml = '';
            if (hasMoreBatches) {
                batchActionsHtml = `
                    <button class="btn-next-batch" onclick="loadNextBatch()">下一批題目 (${(currentBatchIndex + 2)}/${totalBatches})</button>
                    <button class="btn-restart" onclick="restartQuiz()">重新開始</button>
                `;
            } else {
                batchActionsHtml = `
                    <div class="all-complete">
                        🎉 恭喜完成所有詞彙！<br>
                        總分：${totalScore} / ${allWords.length * 10} 分
                    </div>
                    <button class="btn-restart" onclick="restartQuiz()" style="margin-top: 20px;">重新開始</button>
                `;
            }
            
            document.getElementById('batchActions').innerHTML = batchActionsHtml;
        }

        function restartQuiz() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('vocabInput').value = '';
            document.getElementById('error').classList.remove('show');
            
            // Reset all state
            allWords = [];
            currentBatchIndex = 0;
            currentBatchVocab = [];
            quizData = [];
            currentIndex = 0;
            score = 0;
            userAnswers = [];
            totalScore = 0;
            batchesCompleted = 0;
        }
        
        // Global error handler for uncaught errors
        window.onerror = function(msg, url, line, col, error) {
            const debugEl = document.getElementById('debugMsg');
            if (debugEl) {
                debugEl.textContent = 'GLOBAL ERROR: ' + msg + ' (line:' + line + ')';
                debugEl.style.color = 'red';
            }
            return true; // Prevent default error handling
        };
        
        // Promise rejection handler
        window.onunhandledrejection = function(event) {
            const debugEl = document.getElementById('debugMsg');
            if (debugEl) {
                debugEl.textContent = 'UNHANDLED REJECTION: ' + event.reason;
                debugEl.style.color = 'red';
            }
        };
    </script>
</body>
</html>
